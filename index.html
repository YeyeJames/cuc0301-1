
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>佳樂身心診所 - 預約管理系統</title>
    
    <!-- PWA & Icon Settings -->
    <meta name="theme-color" content="#f9e076">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="佳樂診所">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M45 15C30 15 18 27 18 42C18 65 40 85 82 85C70 85 58 75 58 60C58 45 65 35 75 25C65 18 55 15 45 15Z' fill='%23f9e076' /%3E%3Ccircle cx='70' cy='45' r='12' fill='%23ffb85f' /%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='white'/%3E%3Cpath d='M45 15C30 15 18 27 18 42C18 65 40 85 82 85C70 85 58 75 58 60C58 45 65 35 75 25C65 18 55 15 45 15Z' fill='%23f9e076' /%3E%3Ccircle cx='70' cy='45' r='12' fill='%23ffb85f' /%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                yellow: '#f9e076',
                olive: '#d4ca91',
                orange: '#ffb85f',
                dark: '#44403c'
              }
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Noto Sans TC', sans-serif; background-color: #fffef9; color: #44403c; -webkit-tap-highlight-color: transparent; }
      #loading { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fffef9; z-index: 9999; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .weekend-sat { color: #3b82f6 !important; background-color: #eff6ff !important; }
      .weekend-sun { color: #ef4444 !important; background-color: #fef2f2 !important; }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.474.0?external=react",
    "date-fns": "https://esm.sh/date-fns@4.1.0",
    "recharts": "https://esm.sh/recharts@2.15.0?external=react,react-dom"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <div id="loading">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-orange mb-4"></div>
        <span class="text-xs font-bold text-stone-400 tracking-widest">系統載入中...</span>
    </div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect, useMemo, useCallback, useRef } from 'react';
      import { createRoot } from 'react-dom/client';
      import { format, addDays, addMonths, startOfMonth, endOfMonth, startOfWeek, endOfWeek, eachDayOfInterval, isSameMonth, isToday, isSameDay } from 'date-fns';
      import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend } from 'recharts';
      import { 
        Plus, ChevronLeft, ChevronRight, Calendar, CheckCircle, Banknote, Trash2, RotateCcw, 
        X, Settings, LogOut, User as UserIcon, ChartColumn, Download, Upload, Brain, Activity, Zap, Briefcase, FileText, Coffee, Users as UsersIcon, UserPlus, Users, Edit3, Menu, Info, CircleUser,
        Copy
      } from 'lucide-react';

      // --- Data Service ---
      const TREATMENT_ROOMS = ['二診', '3-1', '3-2', '3-3', 'rTMS室', '4-1', '4-2', '4-3'];
      const CATEGORIES = ['心理', '職能', 'rTMS'];
      const KEYS = { THERAPISTS: 'jiale_therapists', TREATMENTS: 'jiale_treatments', APPOINTMENTS: 'jiale_appointments', SESSION: 'jiale_session', ACCOUNTS: 'jiale_accounts' };

      const DataService = {
        get: (key, def) => {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : def;
            } catch (e) { return def; }
        },
        save: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
        clear: (key) => localStorage.removeItem(key)
      };

      // --- Components ---
      const JialeLogo = ({ className = "w-6 h-6" }) => (
        <svg viewBox="0 0 100 100" className={className} fill="none">
          <path d="M45 15C30 15 18 27 18 42C18 65 40 85 82 85C70 85 58 75 58 60C58 45 65 35 75 25C65 18 55 15 45 15Z" fill="#f9e076" />
          <circle cx="70" cy="45" r="12" fill="#ffb85f" />
        </svg>
      );

      const Button = ({ children, variant = 'primary', size = 'md', className = '', icon, onClick, ...props }) => {
        const variants = {
          primary: "bg-[#ffb85f] text-white hover:bg-[#ffa726] shadow-sm",
          secondary: "bg-white text-stone-700 border border-stone-200 hover:bg-stone-50",
          danger: "bg-red-50 text-red-600 border border-red-100 hover:bg-red-100",
          success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md",
          ghost: "bg-transparent text-stone-400 hover:bg-stone-100",
        };
        const sizes = {
          sm: "h-8 px-3 text-[11px] font-bold rounded-lg",
          md: "h-10 px-4 text-xs font-bold rounded-xl",
          lg: "h-12 px-6 text-sm font-black rounded-xl",
        };
        return (
          <button onClick={onClick} className={`inline-flex items-center justify-center transition-all active:scale-95 disabled:opacity-50 ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
            {icon && <span className="mr-1.5">{icon}</span>}
            {children}
          </button>
        );
      };

      const Modal = ({ isOpen, onClose, title, children }) => {
        if (!isOpen) return null;
        return (
          <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-stone-900/60 backdrop-blur-sm">
            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg flex flex-col max-h-[90vh] border border-stone-100">
              <div className="flex items-center justify-between px-8 py-6 border-b border-stone-100">
                <h3 className="font-black text-xl text-stone-800 tracking-tight">{title}</h3>
                <button onClick={onClose} className="p-2 hover:bg-stone-50 rounded-full text-stone-300"><X size={24}/></button>
              </div>
              <div className="p-8 overflow-y-auto no-scrollbar">{children}</div>
            </div>
          </div>
        );
      };

      // --- Main Views ---
      const ScheduleView = ({ user, appointments, therapists, treatments, onAdd, onUpdate, onDelete }) => {
        const [filters, setFilters] = useState({ therapistId: '', category: '', status: '' });
        const [showHistory, setShowHistory] = useState(null); // patientName
        const [groupCopyModal, setGroupCopyModal] = useState(null);
        const [groupCopyForm, setGroupCopyForm] = useState({ startDate: '', time: '', weeks: 1 });

        const filteredAppointments = useMemo(() => {
          let filtered = appointments;
          if (user?.role === 'therapist') {
            filtered = filtered.filter(a => a.therapistId === user.therapistId);
          }
          if (filters.therapistId) filtered = filtered.filter(a => a.therapistId === filters.therapistId);
          if (filters.category) filtered = filtered.filter(a => a.category === filters.category);
          if (filters.status) filtered = filtered.filter(a => a.status === filters.status);
          return filtered;
        }, [appointments, user, filters]);

        const [viewMode, setViewMode] = useState('day');
        const [selectedDate, setSelectedDate] = useState(format(new Date(), 'yyyy-MM-dd'));
        const [isAddOpen, setIsAddOpen] = useState(false);
        const [isAddingToGroup, setIsAddingToGroup] = useState(false);
        const [editingApt, setEditingApt] = useState(null);
        const [hoveredHour, setHoveredHour] = useState(null);
        
        const [form, setForm] = useState({ 
          patientName: '', time: '09:00', date: '', therapistId: '', treatmentId: '', 
          notes: '', treatmentRoom: '二診', category: '心理'
        });

        const [showPatientSuggestions, setShowPatientSuggestions] = useState(false);
        const patientNames = useMemo(() => [...new Set(appointments.map(a => a.patientName))].sort(), [appointments]);
        const filteredPatientNames = useMemo(() => {
          if (!form.patientName) return [];
          return patientNames.filter(name => name.includes(form.patientName) && name !== form.patientName).slice(0, 5);
        }, [patientNames, form.patientName]);

        const handleSelectPatient = (name) => {
          const lastApt = appointments
            .filter(a => a.patientName === name)
            .sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time))[0];
          
          if (lastApt) {
            setForm(prev => ({
              ...prev,
              patientName: name,
              therapistId: lastApt.therapistId,
              treatmentId: lastApt.treatmentId,
              treatmentRoom: lastApt.treatmentRoom,
              category: lastApt.category
            }));
          } else {
            setForm(prev => ({ ...prev, patientName: name }));
          }
          setShowPatientSuggestions(false);
        };

        const STATUS_CONFIG = {
          'scheduled': { label: '預約中', color: 'amber', bg: 'bg-amber-50', border: 'border-amber-100', text: 'text-amber-600', dot: 'bg-amber-400' },
          'completed': { label: '已報到', color: 'blue', bg: 'bg-blue-50', border: 'border-blue-100', text: 'text-blue-600', dot: 'bg-blue-500' },
          'noshow': { label: '未到', color: 'red', bg: 'bg-red-50', border: 'border-red-100', text: 'text-red-600', dot: 'bg-red-500' },
          'cancelled': { label: '取消', color: 'stone', bg: 'bg-stone-50', border: 'border-stone-100', text: 'text-stone-500', dot: 'bg-stone-400' },
          'leave': { label: '請假', color: 'rose', bg: 'bg-rose-50', border: 'border-rose-100', text: 'text-rose-600', dot: 'bg-rose-500' }
        };

        const selectedDateSummary = useMemo(() => {
          const dayApts = appointments.filter(a => a.date === selectedDate);
          const summary = {
            total: dayApts.length,
            revenue: dayApts.reduce((sum, a) => sum + (a.paidAmount || 0), 0)
          };
          Object.keys(STATUS_CONFIG).forEach(status => {
            summary[status] = dayApts.filter(a => (a.status || 'scheduled') === status).length;
          });
          return summary;
        }, [appointments, selectedDate]);

        const renderStatusBadge = (status) => {
          const config = STATUS_CONFIG[status] || STATUS_CONFIG['scheduled'];
          return (
            <div className="flex items-center gap-2 mt-0.5">
              <span className={`w-2 h-2 rounded-full ${config.dot}`}></span>
              <span className={`text-[10px] font-bold ${config.text}`}>
                {config.label}
              </span>
            </div>
          );
        };

        const renderStatusActions = (a) => {
          const currentStatus = a.status || 'scheduled';
          const config = STATUS_CONFIG[currentStatus] || STATUS_CONFIG['scheduled'];
          return (
            <select 
              value={currentStatus} 
              onChange={(e) => {
                const newStatus = e.target.value;
                const updates = { status: newStatus };
                if (newStatus === 'completed') {
                  updates.isPaid = true;
                  updates.paidAmount = a.patientPrice;
                } else {
                  updates.isPaid = false;
                  updates.paidAmount = 0;
                }
                onUpdate(a.id, updates);
              }}
              className={`px-3 py-1.5 rounded-xl text-xs font-black transition-all shadow-sm outline-none appearance-none cursor-pointer border ${config.bg} ${config.border} ${config.text}`}
            >
              {Object.entries(STATUS_CONFIG).map(([key, val]) => (
                <option key={key} value={key} className="text-stone-800 bg-white">{val.label}</option>
              ))}
            </select>
          );
        };

        const renderSmallStatusActions = (a) => {
          const currentStatus = a.status || 'scheduled';
          const config = STATUS_CONFIG[currentStatus] || STATUS_CONFIG['scheduled'];
          return (
            <select 
              value={currentStatus} 
              onChange={(e) => {
                const newStatus = e.target.value;
                const updates = { status: newStatus };
                if (newStatus === 'completed') {
                  updates.isPaid = true;
                  updates.paidAmount = a.patientPrice;
                } else {
                  updates.isPaid = false;
                  updates.paidAmount = 0;
                }
                onUpdate(a.id, updates);
              }}
              className={`px-1 py-0.5 rounded text-[9px] font-black transition-all outline-none appearance-none cursor-pointer border ${config.bg} ${config.border} ${config.text}`}
            >
              {Object.entries(STATUS_CONFIG).map(([key, val]) => (
                <option key={key} value={key} className="text-stone-800 bg-white">{val.label}</option>
              ))}
            </select>
          );
        };

        const currentSelected = useMemo(() => new Date(selectedDate), [selectedDate]);
        const dayApts = useMemo(() => filteredAppointments.filter(a => a.date === selectedDate).sort((a,b) => a.time.localeCompare(b.time)), [filteredAppointments, selectedDate]);
        
        // --- 團體與個別治療分組邏輯 ---
        const groupedApts = useMemo(() => {
          const groups = {};
          dayApts.forEach(apt => {
            const tr = treatments.find(t => t.id === apt.treatmentId);
            const isGroup = apt.isGroup || tr?.isGroupTherapy;
            
            // 為了避免日表格介面重疊，依時間與診間分組
            // 如果同一時段診間有兩筆(例如一筆報到一筆請假)，會合併在同一個卡片中呈現
            const key = `${apt.time}_${apt.treatmentRoom}`;

            if (!groups[key]) {
              groups[key] = {
                id: key,
                time: apt.time,
                therapistId: apt.therapistId,
                treatmentId: apt.treatmentId,
                treatmentRoom: apt.treatmentRoom,
                notes: apt.notes,
                isGroup: isGroup,
                patients: []
              };
            } else {
              // 若其中一筆是團體治療，則整組標記為團體
              if (isGroup) groups[key].isGroup = true;
            }
            groups[key].patients.push(apt);
          });
          
          // 排序：將「請假」或「取消」的預約排在後面，已報到/預約中的排在前面
          Object.values(groups).forEach(group => {
            group.patients.sort((a, b) => {
              const statusOrder = { 'completed': 0, 'scheduled': 1, 'noshow': 2, 'leave': 3, 'cancelled': 4 };
              return (statusOrder[a.status || 'scheduled'] || 1) - (statusOrder[b.status || 'scheduled'] || 1);
            });
            // 更新 group 的主項目資訊為排序後第一筆預約的資訊
            if (group.patients.length > 0) {
              group.treatmentId = group.patients[0].treatmentId;
              group.therapistId = group.patients[0].therapistId;
            }
          });

          return Object.values(groups).sort((a, b) => a.time.localeCompare(b.time));
        }, [dayApts, treatments]);

        const weekDays = useMemo(() => eachDayOfInterval({ start: startOfWeek(currentSelected), end: endOfWeek(currentSelected) }), [currentSelected]);
        const monthDays = useMemo(() => eachDayOfInterval({ start: startOfWeek(startOfMonth(currentSelected)), end: endOfWeek(endOfMonth(currentSelected)) }), [currentSelected]);

        const getAppointmentsForDate = (dateStr) => filteredAppointments.filter(a => a.date === dateStr).sort((a,b) => a.time.localeCompare(b.time));

        const handleSave = (e) => {
          e.preventDefault();
          
          const aptDate = form.date || selectedDate;
          const aptTime = form.time;
          
          // Conflict Detection
          const tr = treatments.find(t => t.id === form.treatmentId);
          const isGroup = form.isGroup || tr?.isGroupTherapy;

          const conflict = appointments.find(a => {
            if (a.id === (editingApt?.id)) return false;
            if (a.date !== aptDate || a.time !== aptTime || a.status === 'cancelled' || a.status === 'leave') return false;
            
            // 如果是團體治療，且治療師、項目、診間完全一致，則視為同一組，不計為衝突
            if (isGroup && a.therapistId === form.therapistId && a.treatmentId === form.treatmentId && a.treatmentRoom === form.treatmentRoom) {
              return false;
            }

            return (a.therapistId === form.therapistId || a.treatmentRoom === form.treatmentRoom);
          });

          if (conflict) {
            const conflictType = conflict.therapistId === form.therapistId ? '治療師' : '治療室';
            const conflictName = conflict.therapistId === form.therapistId 
              ? therapists.find(t => t.id === conflict.therapistId)?.name 
              : conflict.treatmentRoom;
            
            alert(`⚠️ 時段衝突！\n\n${conflictType}「${conflictName}」在 ${aptDate} ${aptTime} 已有預約。\n請更換時段、人員或診間。`);
            return;
          }

          const newApt = {
            ...form,
            id: editingApt ? editingApt.id : `apt_${Date.now()}_${Math.random()}`,
            date: aptDate,
            status: editingApt ? editingApt.status : 'scheduled',
            isGroup: tr?.isGroupTherapy || false,
            patientPrice: tr?.patientPrice || 0,
            therapistFee: tr?.therapistFee || 0,
            isPaid: editingApt ? editingApt.isPaid : false,
            paidAmount: editingApt ? editingApt.paidAmount : 0
          };
          if (editingApt) onUpdate(editingApt.id, newApt); else onAdd(newApt);
          setIsAddOpen(false); setEditingApt(null); setIsAddingToGroup(false);
        };

        const getDayStyleClass = (date) => {
          if (isToday(date)) return 'border-brand-orange ring-2 ring-brand-orange/20';
          const d = date.getDay();
          if (d === 0) return 'weekend-sun border-red-200'; // 星期日
          if (d === 6) return 'weekend-sat border-blue-200'; // 星期六
          return 'bg-white border-stone-100';
        };

        const getDayTextClass = (date) => {
          const d = date.getDay();
          if (isToday(date)) return 'text-brand-orange';
          if (d === 0) return 'text-red-500';
          if (d === 6) return 'text-blue-500';
          return 'text-stone-400';
        };

        return (
          <div className="space-y-6">
            {/* Dashboard Widget */}
            {/* Quick Stats Row */}
            <div className="bg-white px-6 py-3 rounded-[2rem] border border-stone-100 shadow-sm flex flex-wrap items-center gap-x-8 gap-y-2">
              <div className="flex items-center gap-2">
                <span className="text-[10px] font-black text-stone-400 uppercase tracking-widest">當日總診次</span>
                <span className="text-sm font-black text-stone-800">{selectedDateSummary.total}</span>
              </div>
              <div className="h-4 w-px bg-stone-100 hidden sm:block"></div>
              {Object.entries(STATUS_CONFIG).map(([key, config]) => (
                <div key={key} className="flex items-center gap-2">
                  <div className={`w-2 h-2 rounded-full ${config.dot}`}></div>
                  <span className="text-[10px] font-black text-stone-400 uppercase tracking-widest">{config.label}</span>
                  <span className={`text-sm font-black ${config.text}`}>{selectedDateSummary[key] || 0}</span>
                </div>
              ))}
              <div className="ml-auto flex items-center gap-2 bg-emerald-50 px-4 py-1 rounded-full border border-emerald-100">
                <Banknote size={14} className="text-emerald-500" />
                <span className="text-[10px] font-black text-emerald-600 uppercase tracking-widest">今日總收款</span>
                <span className="text-lg font-black text-emerald-700">${selectedDateSummary.revenue.toLocaleString()}</span>
              </div>
            </div>

            {/* Header Toolbar */}
            <div className="flex flex-col gap-4 bg-white p-5 rounded-[2.5rem] border border-stone-100 shadow-sm">
                <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                  <div className="flex flex-wrap items-center gap-2">
                    <div className="flex bg-stone-100 p-1 rounded-xl w-fit">
                      {['day', 'day-table', 'week', 'month'].map(m => (
                        <button key={m} onClick={() => setViewMode(m)} className={`px-4 py-1.5 rounded-lg text-[11px] font-black transition-all ${viewMode === m ? 'bg-white shadow-sm text-stone-800' : 'text-stone-400 hover:text-stone-500'}`}>
                          {m === 'day' ? '日視圖' : m === 'day-table' ? '日視圖(表格)' : m === 'week' ? '週曆' : '月曆'}
                        </button>
                      ))}
                    </div>
                    <button 
                      onClick={() => {
                        setSelectedDate(format(new Date(), 'yyyy-MM-dd'));
                        setViewMode('day');
                      }}
                      className="px-4 py-2 bg-brand-orange/10 text-brand-orange hover:bg-brand-orange hover:text-white rounded-xl text-[11px] font-black transition-all shadow-sm"
                    >
                      今天
                    </button>

                    <div className="h-6 w-px bg-stone-200 mx-1 hidden md:block"></div>

                    {/* Date Navigation (Moved here) */}
                    <div className="flex items-center gap-2">
                      <button onClick={() => {
                        if (viewMode === 'month') {
                          setSelectedDate(format(startOfMonth(addMonths(currentSelected, -1)), 'yyyy-MM-dd'));
                        } else {
                          setSelectedDate(format(addDays(currentSelected, (viewMode === 'day' || viewMode === 'day-table') ? -1 : -7), 'yyyy-MM-dd'));
                        }
                      }} className="p-2 hover:bg-stone-50 rounded-lg border border-stone-100"><ChevronLeft size={16}/></button>
                      <div className="text-center min-w-[100px] font-black relative cursor-pointer">
                        <input type="date" className="absolute inset-0 opacity-0 z-10 cursor-pointer" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} />
                        <span className={`text-lg tracking-tight ${getDayTextClass(currentSelected)}`}>{format(currentSelected, 'MM/dd')}</span>
                        <span className={`text-[9px] ml-1 tracking-widest font-black uppercase`}>{format(currentSelected, 'EEE')}</span>
                      </div>
                      <button onClick={() => {
                        if (viewMode === 'month') {
                          setSelectedDate(format(startOfMonth(addMonths(currentSelected, 1)), 'yyyy-MM-dd'));
                        } else {
                          setSelectedDate(format(addDays(currentSelected, (viewMode === 'day' || viewMode === 'day-table') ? 1 : 7), 'yyyy-MM-dd'));
                        }

      const ReportsView = ({ appointments, therapists, treatments }) => {
        const [selectedMonth, setSelectedMonth] = useState(format(new Date(), 'yyyy-MM'));

        const filteredApts = useMemo(() => {
          return appointments.filter(a => a.status === 'completed' && a.date && a.date.startsWith(selectedMonth));
        }, [appointments, selectedMonth]);

        const stats = useMemo(() => {
          const therapistStats = {};
          const treatmentStats = {};
          let totalRevenue = 0;
          let totalExpense = 0;

          filteredApts.forEach(apt => {
            const treatment = treatments.find(t => t.id === apt.treatmentId);
            const therapist = therapists.find(t => t.id === apt.therapistId);
            if (!treatment || !therapist) return;

            const fee = treatment.therapistFee || 0;
            const price = apt.patientPrice || treatment.patientPrice || 0;

            totalRevenue += price;
            totalExpense += fee;

            // Therapist Stats
            if (!therapistStats[therapist.id]) {
              therapistStats[therapist.id] = { 
                id: therapist.id, 
                name: therapist.name, 
                salary: 0, 
                count: 0,
                details: [] 
              };
            }
            therapistStats[therapist.id].salary += fee;
            therapistStats[therapist.id].count += 1;
            therapistStats[therapist.id].details.push({
              date: apt.date,
              patient: apt.patientName,
              treatment: treatment.name,
              fee: fee,
              price: price
            });

            // Treatment Stats
            if (!treatmentStats[treatment.id]) {
              treatmentStats[treatment.id] = { name: treatment.name, count: 0, revenue: 0 };
            }
            treatmentStats[treatment.id].count += 1;
            treatmentStats[treatment.id].revenue += price;
          });

          return {
            therapists: Object.values(therapistStats).sort((a, b) => b.salary - a.salary),
            treatments: Object.values(treatmentStats).sort((a, b) => b.count - a.count),
            totalRevenue,
            totalExpense,
            netProfit: totalRevenue - totalExpense
          };
        }, [filteredApts, therapists, treatments]);

        const COLORS = ['#ffb85f', '#f9e076', '#d4ca91', '#44403c', '#8884d8', '#82ca9d'];

        return (
          <div className="space-y-8 pb-20 print:space-y-0 print:pb-0">
            {/* Header & Month Picker */}
            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 print:hidden">
              <div>
                <h2 className="text-3xl font-black text-stone-800 tracking-tight">數據報表分析</h2>
                <p className="text-stone-400 font-bold mt-1">診所營運數據與薪資統計</p>
              </div>

                  variant="secondary" 
                  icon={<Download size={16} />}

      const App = () => {
        const [user, setUser] = useState(null);
        const [view, setView] = useState('schedule');
        const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
        const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(true);
        const [syncStatus, setSyncStatus] = useState('connecting'); // connecting, synced, error
        
        const [accounts, setAccounts] = useState(DataService.get(KEYS.ACCOUNTS, []));
        const [therapists, setTherapists] = useState(DataService.get(KEYS.THERAPISTS, []));
        const [treatments, setTreatments] = useState(DataService.get(KEYS.TREATMENTS, []));
        const [appointments, setAppointments] = useState(DataService.get(KEYS.APPOINTMENTS, []));
        const [logs, setLogs] = useState(DataService.get('jiale_logs', []));

        const socketRef = useRef(null);
        const isRemoteUpdate = useRef(false);

        // Helper to add logs
        const addLog = useCallback((action, detail) => {
          const newLog = {
            id: `log_${Date.now()}_${Math.random()}`,
            timestamp: format(new Date(), 'yyyy-MM-dd HH:mm:ss'),
            user: user?.name || '系統',
            action,
            detail
          };
          setLogs(prev => [newLog, ...prev].slice(0, 500)); // Keep last 500 logs
        }, [user]);

        // Background Sync Logic
        useEffect(() => {
          let reconnectTimeout;
          const connect = () => {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const socket = new WebSocket(`${protocol}//${window.location.host}`);
            socketRef.current = socket;
            setSyncStatus('connecting');

            socket.onopen = () => {
              console.log('Sync connected');
              setSyncStatus('synced');
            };

            socket.onmessage = (event) => {
              try {
                const payload = JSON.parse(event.data);
                if (payload.type === 'INIT' || payload.type === 'SYNC') {
                  const { appointments: remoteApts, therapists: remoteTherapists, treatments: remoteTreatments, logs: remoteLogs, accounts: remoteAccounts } = payload.data;
                  
                  // Mark as remote update to prevent loop
                  isRemoteUpdate.current = true;
                  
                  if (remoteApts) setAppointments(remoteApts);
                  if (remoteTherapists) setTherapists(remoteTherapists);
                  if (remoteTreatments) setTreatments(remoteTreatments);
                  if (remoteLogs) setLogs(remoteLogs);
                  if (remoteAccounts) setAccounts(remoteAccounts);
                  
                  setSyncStatus('synced');
                  
                  // Reset flag after state updates are processed
                  setTimeout(() => { isRemoteUpdate.current = false; }, 100);
                }
              } catch (e) {
                console.error('Sync error:', e);
              }
            };

            socket.onclose = () => {
              console.log('Sync disconnected, retrying in 3s...');
              setSyncStatus('error');
              reconnectTimeout = setTimeout(connect, 3000);
            };

            socket.onerror = (err) => {
              console.error('WebSocket error:', err);
              setSyncStatus('error');
            };
          };

          connect();
          return () => {
            if (socketRef.current) socketRef.current.close();
            clearTimeout(reconnectTimeout);
          };
        }, []);

        // Push updates to cloud (Debounced)
        const pushToCloud = useCallback((data) => {
          if (socketRef.current && socketRef.current.readyState === WebSocket.OPEN) {
            socketRef.current.send(JSON.stringify({ type: 'UPDATE', data }));
            setSyncStatus('synced');
          }
        }, []);

        // Sync local storage and push to cloud when state changes
        useEffect(() => {
          const data = { appointments, therapists, treatments, logs, accounts };
          DataService.save(KEYS.APPOINTMENTS, appointments);
          DataService.save(KEYS.THERAPISTS, therapists);
          DataService.save(KEYS.TREATMENTS, treatments);
          DataService.save(KEYS.ACCOUNTS, accounts);
          DataService.save('jiale_logs', logs);
          
          // Only push if we have a connection AND it's a local change
          if (!isRemoteUpdate.current) {
            const timeout = setTimeout(() => pushToCloud(data), 500);
            return () => clearTimeout(timeout);
          }
        }, [appointments, therapists, treatments, logs, accounts, pushToCloud]);

        useEffect(() => { document.getElementById('loading').style.display = 'none'; }, []);

        const handleUpdateAccounts = useCallback((data) => setAccounts(data), []);
        const handleUpdateTherapists = useCallback((data) => setTherapists(data), []);
        const handleUpdateTreatments = useCallback((data) => setTreatments(data), []);

        if (!user) return <LoginView onLogin={u => { setUser(u); }} accounts={accounts} therapists={therapists} />;

        return (
          <div className="min-h-screen bg-[#fffef5] flex flex-col lg:flex-row print:bg-white">

                onClick={() => setIsMobileMenuOpen(false)}
              />
            )}

            <aside className={`fixed top-0 inset-y-0 left-0 w-72 bg-stone-900 text-white flex flex-col z-50 shadow-2xl transition-transform duration-300 ${isMobileMenuOpen || !isSidebarCollapsed ? 'translate-x-0' : '-translate-x-full'} print:hidden`}>
              <div className="p-10 border-b border-stone-800 flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="bg-white p-2.5 rounded-2xl shadow-lg"><JialeLogo /></div>
                  <div>
                    <h1 className="font-black text-xl leading-none">佳樂身心</h1>
                    <div className="flex items-center gap-2 mt-1.5">
                      <div className={`w-1.5 h-1.5 rounded-full ${syncStatus === 'synced' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]' : syncStatus === 'connecting' ? 'bg-amber-500 animate-pulse' : 'bg-red-500'}`}></div>
                      <span className="text-[9px] text-stone-500 font-black tracking-widest uppercase">
                        {syncStatus === 'synced' ? 'Cloud Synced' : syncStatus === 'connecting' ? 'Connecting...' : 'Offline'}
                      </span>
                    </div>
                  </div>
                </div>
                <button onClick={() => { setIsMobileMenuOpen(false); setIsSidebarCollapsed(true); }} className="p-2 bg-stone-800 rounded-xl hover:bg-stone-700 transition-colors">
                  <X size={20} />
                </button>
              </div>
              <nav className="p-6 space-y-2 flex-1">
                <button onClick={() => { setView('schedule'); setIsMobileMenuOpen(false); setIsSidebarCollapsed(true); }} className={`w-full flex items-center gap-4 px-6 py-4 rounded-3xl text-sm font-black transition-all ${view === 'schedule' ? 'bg-brand-orange text-white shadow-lg' : 'text-stone-500 hover:text-brand-yellow'}`}><Calendar size={20}/> 預約排程</button>
                {user.role === 'admin' && (
                  <>
                    <button onClick={() => { setView('reports'); setIsMobileMenuOpen(false); setIsSidebarCollapsed(true); }} className={`w-full flex items-center gap-4 px-6 py-4 rounded-3xl text-sm font-black transition-all ${view === 'reports' ? 'bg-brand-orange text-white shadow-lg' : 'text-stone-500 hover:text-brand-yellow'}`}><ChartColumn size={20}/> 數據報表</button>

                  </>

              </nav>
              <div className="p-8 border-t border-stone-800">
                <div className="mb-4 text-center">

                  展開選單
                </span>
              </button>
            )}

            {/* Desktop Sidebar Overlay for closing */}
            {!isSidebarCollapsed && (
              <div 
                className="fixed inset-0 bg-black/20 z-40 hidden lg:block backdrop-blur-[2px]"
                onClick={() => setIsSidebarCollapsed(true)}
              />
            )}

            <main className="flex-1 p-4 lg:p-8 min-h-screen max-w-full mx-auto overflow-x-hidden w-full print:p-0 print:m-0 print:max-w-none print:overflow-visible">
              {view === 'schedule' && (
                <ScheduleView 
                  user={user}
                  appointments={appointments} 
                  therapists={therapists} 
                  treatments={treatments} 
                  onAdd={x => { 
                    if (Array.isArray(x)) {
                      setAppointments(prev => [...prev, ...x]);
                      addLog('批次新增預約', `共 ${x.length} 筆`);
                    } else {
                      setAppointments(prev => [...prev, x]); 
                      addLog('新增預約', `個案: ${x.patientName}, 日期: ${x.date}`); 
                    }
                  }} 
                  onUpdate={(id, u) => { 
                    const old = appointments.find(a => a.id === id);
                    setAppointments(appointments.map(a => a.id === id ? { ...a, ...u } : a)); 
                    addLog('更新預約', `個案: ${old?.patientName}, 變更: ${JSON.stringify(u)}`);
                  }} 
                  onDelete={id => { 
                    const old = appointments.find(a => a.id === id);
                    setAppointments(appointments.filter(a => a.id !== id)); 
                    addLog('刪除預約', `個案: ${old?.patientName}, 日期: ${old?.date}`);
                  }} 
                />
              )}
              {view === 'settings' && (
                <SettingsView 
                  therapists={therapists} 
                  treatments={treatments} 
                  appointments={appointments}
                  logs={logs} 
                  accounts={accounts}
                  onUpdateT={data => { 
                    setTherapists(data); 
                    addLog('更新治療師名單', `總人數: ${data.length}`);
                  }} 
                  onUpdateTr={data => { 
                    setTreatments(data); 
                    addLog('更新治療項目', `總項目數: ${data.length}`);
                  }} 
                  onUpdateA={data => {
                    setAccounts(data);
                    addLog('更新帳號名單', `總人數: ${data.length}`);
                  }}
                  onImportData={(data) => {
                    if (data.therapists) setTherapists(data.therapists);
                    if (data.treatments) setTreatments(data.treatments);
                    if (data.appointments) setAppointments(data.appointments);
                    if (data.logs) setLogs(data.logs);
                    if (data.accounts) setAccounts(data.accounts);
                    addLog('系統恢復', '從備份檔案匯入資料');
                  }}
                />
              )}
              {view === 'reports' && <ReportsView appointments={appointments} therapists={therapists} treatments={treatments} />}
            </main>
          </div>
        );
      };

      createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
