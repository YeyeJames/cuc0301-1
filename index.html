
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>佳樂身心診所 - 預約管理系統</title>
    
    <!-- PWA & Icon Settings -->
    <meta name="theme-color" content="#f9e076">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="佳樂診所">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M45 15C30 15 18 27 18 42C18 65 40 85 82 85C70 85 58 75 58 60C58 45 65 35 75 25C65 18 55 15 45 15Z' fill='%23f9e076' /%3E%3Ccircle cx='70' cy='45' r='12' fill='%23ffb85f' /%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='white'/%3E%3Cpath d='M45 15C30 15 18 27 18 42C18 65 40 85 82 85C70 85 58 75 58 60C58 45 65 35 75 25C65 18 55 15 45 15Z' fill='%23f9e076' /%3E%3Ccircle cx='70' cy='45' r='12' fill='%23ffb85f' /%3E%3C/svg%3E">
    
    <!-- <link rel="manifest" href='data:application/manifest+json,{"name":"佳樂身心診所預約排程系統","short_name":"佳樂診所","display":"standalone","start_url":".","background_color":"#fffef9","theme_color":"#f9e076","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='white'/%3E%3Cpath d='M45 15C30 15 18 27 18 42C18 65 40 85 82 85C70 85 58 75 58 60C58 45 65 35 75 25C65 18 55 15 45 15Z' fill='%23f9e076' /%3E%3Ccircle cx='70' cy='45' r='12' fill='%23ffb85f' /%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}'> -->

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                yellow: '#f9e076',
                olive: '#d4ca91',
                orange: '#ffb85f',
                dark: '#44403c'
              }
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Noto Sans TC', sans-serif; background-color: #fffef9; color: #44403c; -webkit-tap-highlight-color: transparent; }
      #loading { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fffef9; z-index: 9999; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .weekend-sat { color: #3b82f6 !important; background-color: #eff6ff !important; }
      .weekend-sun { color: #ef4444 !important; background-color: #fef2f2 !important; }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.474.0?external=react",
    "date-fns": "https://esm.sh/date-fns@4.1.0",
    "recharts": "https://esm.sh/recharts@2.15.0?external=react,react-dom"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <div id="loading">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-orange mb-4"></div>
        <span class="text-xs font-bold text-stone-400 tracking-widest">系統載入中...</span>
    </div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect, useMemo, useCallback, useRef } from 'react';
      import { createRoot } from 'react-dom/client';
      import { format, addDays, startOfMonth, endOfMonth, startOfWeek, endOfWeek, eachDayOfInterval, isSameMonth, isToday, isSameDay } from 'date-fns';
      import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend } from 'recharts';
      import { 
        Plus, ChevronLeft, ChevronRight, Calendar, CheckCircle, Banknote, Trash2, RotateCcw, 
        X, Settings, LogOut, User as UserIcon, ChartColumn, Download, Upload, Brain, Activity, Zap, Briefcase, FileText, Coffee, Users as UsersIcon, UserPlus, Users, Edit3, Menu, Info, CircleUser
      } from 'lucide-react';

      // --- Data Service ---
      const TREATMENT_ROOMS = ['二診', '3-1', '3-2', '3-3'];
      const CATEGORIES = ['心理', '職能', 'rTMS'];
      const KEYS = { THERAPISTS: 'jiale_therapists', TREATMENTS: 'jiale_treatments', APPOINTMENTS: 'jiale_appointments', SESSION: 'jiale_session', ACCOUNTS: 'jiale_accounts' };

      const DataService = {
        get: (key, def) => {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : def;
            } catch (e) { return def; }
        },
        save: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
        clear: (key) => localStorage.removeItem(key)
      };

      // --- Components ---
      const JialeLogo = ({ className = "w-6 h-6" }) => (
        <svg viewBox="0 0 100 100" className={className} fill="none">
          <path d="M45 15C30 15 18 27 18 42C18 65 40 85 82 85C70 85 58 75 58 60C58 45 65 35 75 25C65 18 55 15 45 15Z" fill="#f9e076" />
          <circle cx="70" cy="45" r="12" fill="#ffb85f" />
        </svg>
      );

      const Button = ({ children, variant = 'primary', size = 'md', className = '', icon, onClick, ...props }) => {
        const variants = {
          primary: "bg-[#ffb85f] text-white hover:bg-[#ffa726] shadow-sm",
          secondary: "bg-white text-stone-700 border border-stone-200 hover:bg-stone-50",
          danger: "bg-red-50 text-red-600 border border-red-100 hover:bg-red-100",
          success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md",
          ghost: "bg-transparent text-stone-400 hover:bg-stone-100",
        };
        const sizes = {
          sm: "h-8 px-3 text-[11px] font-bold rounded-lg",
          md: "h-10 px-4 text-xs font-bold rounded-xl",
          lg: "h-12 px-6 text-sm font-black rounded-xl",
        };
        return (
          <button onClick={onClick} className={`inline-flex items-center justify-center transition-all active:scale-95 disabled:opacity-50 ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
            {icon && <span className="mr-1.5">{icon}</span>}
            {children}
          </button>
        );
      };

      const Modal = ({ isOpen, onClose, title, children }) => {
        if (!isOpen) return null;
        return (
          <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-stone-900/60 backdrop-blur-sm">
            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg flex flex-col max-h-[90vh] border border-stone-100">
              <div className="flex items-center justify-between px-8 py-6 border-b border-stone-100">
                <h3 className="font-black text-xl text-stone-800 tracking-tight">{title}</h3>
                <button onClick={onClose} className="p-2 hover:bg-stone-50 rounded-full text-stone-300"><X size={24}/></button>
              </div>
              <div className="p-8 overflow-y-auto no-scrollbar">{children}</div>
            </div>
          </div>
        );
      };

      // --- Main Views ---
      const ScheduleView = ({ user, appointments, therapists, treatments, onAdd, onUpdate, onDelete }) => {
        const filteredAppointments = useMemo(() => {
          if (user?.role === 'therapist') {
            return appointments.filter(a => a.therapistId === user.therapistId);
          }
          return appointments;
        }, [appointments, user]);

        const [viewMode, setViewMode] = useState('day');
        const [selectedDate, setSelectedDate] = useState(format(new Date(), 'yyyy-MM-dd'));
        const [isAddOpen, setIsAddOpen] = useState(false);
        const [editingApt, setEditingApt] = useState(null);
        
        const [form, setForm] = useState({ 
          patientName: '', time: '09:00', date: '', therapistId: '', treatmentId: '', 
          notes: '', treatmentRoom: '二診', isGroup: false, category: '心理'
        });

        const STATUS_CONFIG = {
          'scheduled': { label: '預約中', color: 'amber', bg: 'bg-amber-50', border: 'border-amber-100', text: 'text-amber-600', dot: 'bg-amber-400' },
          'completed': { label: '已完成', color: 'blue', bg: 'bg-blue-50', border: 'border-blue-100', text: 'text-blue-600', dot: 'bg-blue-500' },
          'cancelled': { label: '取消', color: 'stone', bg: 'bg-stone-50', border: 'border-stone-100', text: 'text-stone-500', dot: 'bg-stone-400' },
          'leave': { label: '請假', color: 'rose', bg: 'bg-rose-50', border: 'border-rose-100', text: 'text-rose-600', dot: 'bg-rose-500' }
        };

        const renderStatusBadge = (status) => {
          const config = STATUS_CONFIG[status] || STATUS_CONFIG['scheduled'];
          return (
            <div className="flex items-center gap-2 mt-0.5">
              <span className={`w-2 h-2 rounded-full ${config.dot}`}></span>
              <span className={`text-[10px] font-bold ${config.text}`}>
                {config.label}
              </span>
            </div>
          );
        };

        const renderStatusActions = (a) => {
          const currentStatus = a.status || 'scheduled';
          const config = STATUS_CONFIG[currentStatus];
          return (
            <select 
              value={currentStatus} 
              onChange={(e) => {
                const newStatus = e.target.value;
                const updates = { status: newStatus };
                if (newStatus === 'completed') {
                  updates.isPaid = true;
                  updates.paidAmount = a.patientPrice;
                } else {
                  updates.isPaid = false;
                  updates.paidAmount = 0;
                }
                onUpdate(a.id, updates);
              }}
              className={`px-3 py-1.5 rounded-xl text-xs font-black transition-all shadow-sm outline-none appearance-none cursor-pointer border ${config.bg} ${config.border} ${config.text}`}
            >
              {Object.entries(STATUS_CONFIG).map(([key, val]) => (
                <option key={key} value={key} className="text-stone-800 bg-white">{val.label}</option>
              ))}
            </select>
          );
        };

        const currentSelected = useMemo(() => new Date(selectedDate), [selectedDate]);
        const dayApts = useMemo(() => filteredAppointments.filter(a => a.date === selectedDate).sort((a,b) => a.time.localeCompare(b.time)), [filteredAppointments, selectedDate]);
        
        // --- 團體與個別治療分組邏輯 ---
        const groupedApts = useMemo(() => {
          const groups = {};
          dayApts.forEach(apt => {
            const tr = treatments.find(t => t.id === apt.treatmentId);
            const isGroup = apt.isGroup || tr?.isGroupTherapy;
            
            // 團體治療：依時間、治療師、項目、診間分組
            // 個別治療：每個預約獨立顯示
            const key = isGroup 
              ? `${apt.time}_${apt.therapistId}_${apt.treatmentId}_${apt.treatmentRoom}`
              : `indiv_${apt.id}`;

            if (!groups[key]) {
              groups[key] = {
                id: key,
                time: apt.time,
                therapistId: apt.therapistId,
                treatmentId: apt.treatmentId,
                treatmentRoom: apt.treatmentRoom,
                notes: apt.notes,
                isGroup: isGroup,
                patients: []
              };
            }
            groups[key].patients.push(apt);
          });
          return Object.values(groups).sort((a, b) => a.time.localeCompare(b.time));
        }, [dayApts, treatments]);

        const weekDays = useMemo(() => eachDayOfInterval({ start: startOfWeek(currentSelected), end: endOfWeek(currentSelected) }), [currentSelected]);
        const monthDays = useMemo(() => eachDayOfInterval({ start: startOfWeek(startOfMonth(currentSelected)), end: endOfWeek(endOfMonth(currentSelected)) }), [currentSelected]);

        const getAppointmentsForDate = (dateStr) => filteredAppointments.filter(a => a.date === dateStr).sort((a,b) => a.time.localeCompare(b.time));

        const handleSave = (e) => {
          e.preventDefault();
          const tr = treatments.find(x => x.id === form.treatmentId);
          const newApt = {
            ...form,
            id: editingApt ? editingApt.id : `apt_${Date.now()}_${Math.random()}`,
            date: form.date || selectedDate,
            status: editingApt ? editingApt.status : 'scheduled',
            patientPrice: tr?.patientPrice || 0,
            therapistFee: tr?.therapistFee || 0,
            isPaid: editingApt ? editingApt.isPaid : false,
            paidAmount: editingApt ? editingApt.paidAmount : 0
          };
          if (editingApt) onUpdate(editingApt.id, newApt); else onAdd(newApt);
          setIsAddOpen(false); setEditingApt(null);
        };

        const getDayStyleClass = (date) => {
          if (isToday(date)) return 'border-brand-orange ring-2 ring-brand-orange/20';
          const d = date.getDay();
          if (d === 0) return 'weekend-sun border-red-200'; // 星期日
          if (d === 6) return 'weekend-sat border-blue-200'; // 星期六
          return 'bg-white border-stone-100';
        };

        const getDayTextClass = (date) => {
          const d = date.getDay();
          if (isToday(date)) return 'text-brand-orange';
          if (d === 0) return 'text-red-500';
          if (d === 6) return 'text-blue-500';
          return 'text-stone-400';
        };

        return (
          <div className="space-y-6">
            {/* Header Toolbar */}
            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-5 rounded-[2.5rem] border border-stone-100 shadow-sm">
              <div className="flex bg-stone-100 p-1.5 rounded-2xl w-fit">
                {['day', 'week', 'month'].map(m => (
                  <button key={m} onClick={() => setViewMode(m)} className={`px-5 py-2 rounded-xl text-xs font-black transition-all ${viewMode === m ? 'bg-white shadow-sm text-stone-800' : 'text-stone-400 hover:text-stone-500'}`}>
                    {m === 'day' ? '日視圖' : m === 'week' ? '週曆' : '月曆'}
                  </button>
                ))}
              </div>
              <div className="flex items-center gap-4">
                <button onClick={() => setSelectedDate(format(addDays(currentSelected, viewMode === 'day' ? -1 : viewMode === 'week' ? -7 : -30), 'yyyy-MM-dd'))} className="p-2.5 hover:bg-stone-50 rounded-xl border border-stone-100"><ChevronLeft size={20}/></button>
                <div className="text-center min-w-[140px] font-black relative cursor-pointer">
                  <input type="date" className="absolute inset-0 opacity-0 z-10 cursor-pointer" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} />
                  <span className={`text-xl tracking-tight ${getDayTextClass(currentSelected)}`}>{format(currentSelected, 'MM/dd')}</span>
                  <span className={`text-[10px] ml-2 tracking-widest font-black uppercase`}>{format(currentSelected, 'EEE')}</span>
                </div>
                <button onClick={() => setSelectedDate(format(addDays(currentSelected, viewMode === 'day' ? 1 : viewMode === 'week' ? 7 : 30), 'yyyy-MM-dd'))} className="p-2.5 hover:bg-stone-50 rounded-xl border border-stone-100"><ChevronRight size={20}/></button>
              </div>
              {user?.role !== 'therapist' && (
                <Button onClick={() => { 
                  setEditingApt(null); 
                  setForm({ 
                    patientName: '', 
                    time: '09:00', 
                    date: selectedDate,
                    therapistId: '', 
                    treatmentId: '', 
                    notes: '', 
                    treatmentRoom: '二診',
                    isGroup: false,
                    category: '心理'
                  }); 
                  setIsAddOpen(true); 
                }} icon={<Plus size={20}/>}>新增預約</Button>
              )}
            </div>

            {/* Content Logic */}
            {viewMode === 'day' && (
              <div className="space-y-4">
                {groupedApts.length === 0 ? (
                  <div className="py-32 text-center bg-white rounded-[3rem] border border-stone-100 border-dashed">
                    <Coffee size={48} className="mx-auto text-stone-200 mb-4" />
                    <p className="font-black text-stone-300">今日尚無排程</p>
                  </div>
                ) : groupedApts.map((group) => {
                  const treatment = treatments.find(t => t.id === group.treatmentId);
                  const isGroup = group.isGroup;
                  
                  return (
                    <div key={group.id} className={`p-6 rounded-[2.5rem] border transition-all flex flex-col md:flex-row gap-6 bg-white hover:shadow-md ${isGroup ? 'border-brand-orange/40 bg-brand-orange/[0.02] ring-4 ring-brand-orange/[0.05]' : 'border-stone-100 shadow-sm'}`}>
                      {/* 時間與類型標籤 */}
                      <div className="flex flex-col items-center shrink-0">
                        <div className={`w-14 h-14 rounded-2xl flex flex-col items-center justify-center font-black text-white shadow-lg ${isGroup ? 'bg-brand-orange' : 'bg-stone-800'}`}>
                          <span className="text-sm">{group.time}</span>
                        </div>
                        {isGroup && <span className="mt-2 text-[10px] font-black text-brand-orange bg-white px-2 py-0.5 rounded-lg border border-brand-orange/20 shadow-sm">團體治療</span>}
                        <div className="mt-2 text-[10px] font-bold text-stone-400 bg-stone-100 px-2 py-0.5 rounded">{group.treatmentRoom}</div>
                      </div>

                      {/* 內容區 */}
                      <div className="flex-1 space-y-4">
                        <div className="flex items-center justify-between border-b border-stone-100/50 pb-2">
                          <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
                            <h4 className="text-sm font-black text-stone-700 uppercase tracking-wider">{treatment?.name}</h4>
                            <div className="flex items-center gap-1.5">
                                <UsersIcon size={14} className="text-stone-300" />
                                <span className="text-[10px] font-black text-stone-500">{therapists.find(x => x.id === group.therapistId)?.name}</span>
                            </div>
                          </div>
                          
                              {isGroup && user?.role !== 'therapist' && (
                                <button onClick={() => {
                                  setEditingApt(null);
                                  setForm({ 
                                    patientName: '', 
                                    time: group.time, 
                                    date: selectedDate,
                                    therapistId: group.therapistId, 
                                    treatmentId: group.treatmentId, 
                                    notes: group.notes || '', 
                                    treatmentRoom: group.treatmentRoom,
                                    isGroup: true,
                                    category: treatments.find(t => t.id === group.treatmentId)?.category || '心理'
                                  });
                                  setIsAddOpen(true);
                                }} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-brand-orange/10 text-brand-orange hover:bg-brand-orange hover:text-white transition-all text-[11px] font-black group">
                              <UserPlus size={14} className="group-hover:scale-110 transition-transform" /> 加入個案
                            </button>
                          )}
                        </div>

                        {/* 個案顯示區 */}
                        {isGroup ? (
                          /* 團體治療：列表排列，使用完整文字按鈕 */
                          <div className="space-y-3">
                            {group.patients.map(a => {
                              const config = STATUS_CONFIG[a.status || 'scheduled'];
                              return (
                                <div key={a.id} className={`p-4 rounded-2xl border flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-all ${config.bg} ${config.border}`}>
                                  <div className="flex items-center gap-3">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center font-black text-xs bg-white ${config.text} shadow-sm`}>
                                      {a.patientName.charAt(0)}
                                    </div>
                                    <div>
                                      <p className="font-black text-stone-800">{a.patientName}</p>
                                      <div className="flex items-center gap-2">
                                        {renderStatusBadge(a.status || 'scheduled')}
                                        <span className="text-[10px] font-black text-brand-orange bg-brand-orange/5 px-1.5 py-0.5 rounded">應收 ${a.patientPrice || 0}</span>
                                      </div>
                                      {a.notes && <p className="text-[10px] text-stone-400 mt-1 italic font-medium">註：{a.notes}</p>}
                                    </div>
                                  </div>
                                  <div className="flex items-center gap-2 flex-wrap sm:flex-nowrap">
                                    {user?.role !== 'therapist' && (
                                      <button onClick={() => { 
                                        setEditingApt(a); 
                                        setForm({
                                          ...a,
                                          category: treatments.find(t => t.id === a.treatmentId)?.category || '心理'
                                        }); 
                                        setIsAddOpen(true); 
                                      }} className="px-3 py-1.5 bg-white border border-stone-100 text-stone-400 hover:text-brand-orange hover:border-brand-orange rounded-xl text-[10px] font-black transition-all shadow-sm">修改預約</button>
                                    )}
                                    {renderStatusActions(a)}
                                    {user?.role !== 'therapist' && (
                                      <button onClick={() => confirm('確定刪除此預約？') && onDelete(a.id)} className="p-2 text-stone-300 hover:text-red-500 transition-all"><Trash2 size={16}/></button>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          /* 個別治療：單一橫向排列 */
                          <div className="space-y-2">
                            {group.patients.map(a => {
                              const config = STATUS_CONFIG[a.status || 'scheduled'];
                              return (
                                <div key={a.id} className={`p-5 rounded-2xl border flex items-center justify-between transition-all ${config.bg} ${config.border}`}>
                                  <div className="flex items-center gap-4">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black bg-white ${config.text} shadow-sm`}>
                                      {a.patientName.charAt(0)}
                                    </div>
                                    <div>
                                      <p className="font-black text-lg text-stone-800">{a.patientName}</p>
                                      <div className="flex items-center gap-2">
                                        {renderStatusBadge(a.status || 'scheduled')}
                                        <span className="text-[10px] font-black text-brand-orange bg-brand-orange/5 px-1.5 py-0.5 rounded">應收 ${a.patientPrice || 0}</span>
                                      </div>
                                      {a.notes && <p className="text-xs text-stone-400 mt-1 italic font-medium">備註：{a.notes}</p>}
                                    </div>
                                  </div>
                                  <div className="flex items-center gap-2">
                                    {user?.role !== 'therapist' && (
                                      <button onClick={() => { 
                                        setEditingApt(a); 
                                        setForm({
                                          ...a,
                                          category: treatments.find(t => t.id === a.treatmentId)?.category || '心理'
                                        }); 
                                        setIsAddOpen(true); 
                                      }} className="px-4 py-2 bg-white border border-stone-100 text-stone-400 hover:text-brand-orange hover:border-brand-orange rounded-xl text-xs font-black transition-all shadow-sm">修改預約</button>
                                    )}
                                    {renderStatusActions(a)}
                                    {user?.role !== 'therapist' && (
                                      <button onClick={() => confirm('確定刪除此預約？') && onDelete(a.id)} className="p-2 text-stone-300 hover:text-red-500 transition-all"><Trash2 size={18}/></button>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {viewMode === 'week' && (
              <div className="grid grid-cols-1 sm:grid-cols-7 gap-3">
                {weekDays.map(day => {
                  const ds = format(day, 'yyyy-MM-dd');
                  const dayApts = getAppointmentsForDate(ds);
                  return (
                    <div key={ds} className={`min-h-[250px] rounded-[2rem] border p-4 flex flex-col transition-all ${getDayStyleClass(day)}`}>
                      <div className="text-center mb-4">
                        <p className={`text-[10px] font-black uppercase mb-1 tracking-widest`}>{format(day, 'EEE')}</p>
                        <button onClick={() => {setSelectedDate(ds); setViewMode('day');}} className={`text-2xl font-black w-10 h-10 mx-auto flex items-center justify-center rounded-full transition-all hover:scale-110 ${isToday(day) ? 'bg-brand-orange text-white shadow-lg' : ''}`}>
                          {format(day, 'd')}
                        </button>
                      </div>
                      <div className="flex-1 space-y-2 overflow-y-auto no-scrollbar">
                        {dayApts.map(a => (
                          <div key={a.id} onClick={() => { 
                            if(user?.role !== 'therapist'){ 
                              setEditingApt(a); 
                              setForm({
                                ...a,
                                category: treatments.find(t => t.id === a.treatmentId)?.category || '心理'
                              }); 
                              setIsAddOpen(true); 
                            } 
                          }} className={`p-2 rounded-xl bg-white/90 border border-stone-100 text-[10px] font-black ${user?.role !== 'therapist' ? 'cursor-pointer hover:border-brand-orange hover:shadow-md' : ''} transition-all shadow-sm flex flex-col gap-0.5`}>
                            <span className="text-brand-orange opacity-80">{a.time}</span>
                            <span className="text-stone-800 break-words leading-tight">{a.patientName}</span>
                          </div>
                        ))}
                      </div>
                      {user?.role !== 'therapist' && (
                        <button onClick={() => {setSelectedDate(ds); setEditingApt(null); setForm({ patientName: '', time: '09:00', therapistId: '', treatmentId: '', notes: '', treatmentRoom: '二診' }); setIsAddOpen(true);}} className="mt-3 w-full py-2 flex items-center justify-center text-stone-300 hover:text-brand-orange hover:bg-white rounded-xl transition-all border border-dashed border-stone-200 hover:border-brand-orange"><Plus size={18}/></button>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {viewMode === 'month' && (
              <div className="bg-white p-6 rounded-[2.5rem] border border-stone-100 shadow-sm overflow-hidden">
                <div className="grid grid-cols-7 gap-2 mb-4 text-center text-[10px] font-black text-stone-400 uppercase tracking-widest">
                  {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map((d, i) => (
                    <div key={d} className={i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : ''}>{d}</div>
                  ))}
                </div>
                <div className="grid grid-cols-7 gap-2 md:gap-3">
                  {monthDays.map(day => {
                    const ds = format(day, 'yyyy-MM-dd');
                    const dayApts = getAppointmentsForDate(ds);
                    const isCurMonth = isSameMonth(day, currentSelected);
                    return (
                      <div key={ds} onClick={() => {setSelectedDate(ds); setViewMode('day');}} className={`min-h-[110px] p-2 rounded-3xl border transition-all cursor-pointer relative flex flex-col items-center justify-start ${!isCurMonth ? 'bg-stone-50 opacity-20' : getDayStyleClass(day)} hover:shadow-xl hover:-translate-y-1`}>
                        <span className={`text-sm font-black w-8 h-8 flex items-center justify-center rounded-full ${isToday(day) ? 'bg-brand-orange text-white ring-4 ring-brand-orange/20' : ''}`}>
                          {format(day, 'd')}
                        </span>
                        {dayApts.length > 0 && (
                          <div className="mt-2 flex flex-wrap justify-center gap-1.5 px-1">
                            {dayApts.slice(0, 6).map(a => (
                              <div key={a.id} className="w-1.5 h-1.5 rounded-full bg-brand-orange shadow-sm"></div>
                            ))}
                            {dayApts.length > 6 && <span className="text-[8px] text-stone-300 font-bold leading-none">+{dayApts.length-6}</span>}
                          </div>
                        )}
                        <span className="mt-auto text-[9px] font-bold text-stone-300 group-hover:text-stone-500">{dayApts.length > 0 ? `${dayApts.length} 診` : ''}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Add/Edit Modal */}
            <Modal isOpen={isAddOpen} onClose={() => setIsAddOpen(false)} title={editingApt ? "編輯排程" : "建立預約"}>
               <form onSubmit={handleSave} className="space-y-4">
                  <div className="bg-stone-50 p-4 rounded-2xl border border-stone-100 space-y-3">
                    <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest ml-2">預約日期</label>
                    <input type="date" className="w-full h-12 px-5 rounded-xl border-2 border-transparent bg-white font-bold outline-none focus:border-brand-orange transition-all shadow-sm" value={form.date} onChange={e => setForm({...form, date: e.target.value})} required />
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1.5 ml-2">個案姓名</label>
                      <input className="w-full h-12 px-5 rounded-2xl border-2 border-stone-50 bg-stone-50 font-bold outline-none focus:border-brand-orange transition-all shadow-inner" value={form.patientName} onChange={e => setForm({...form, patientName: e.target.value})} required autoFocus />
                    </div>
                    <div>
                      <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1.5 ml-2">預約時間</label>
                      <input type="time" className="w-full h-12 px-5 rounded-2xl border-2 border-stone-50 bg-stone-50 font-bold outline-none focus:border-brand-orange transition-all shadow-inner" value={form.time} onChange={e => setForm({...form, time: e.target.value})} required />
                    </div>
                  </div>
                  <div>
                    <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1.5 ml-2">治療室</label>
                    <div className="grid grid-cols-4 gap-2">
                      {TREATMENT_ROOMS.map(r => (
                        <button key={r} type="button" onClick={() => setForm({...form, treatmentRoom: r})} className={`py-2 rounded-xl text-[11px] font-black transition-all ${form.treatmentRoom === r ? 'bg-stone-900 text-white shadow-lg' : 'bg-stone-50 text-stone-400 border border-stone-100'}`}>{r}</button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1.5 ml-2">治療類型</label>
                    <div className="grid grid-cols-3 gap-2">
                      {CATEGORIES.map(c => (
                        <button key={c} type="button" onClick={() => setForm({...form, category: c, therapistId: '', treatmentId: ''})} className={`py-2 rounded-xl text-[11px] font-black transition-all ${form.category === c ? 'bg-brand-yellow text-stone-800 shadow-md' : 'bg-stone-50 text-stone-400 border border-stone-100'}`}>{c}</button>
                      ))}
                    </div>
                  </div>
                  <div className="flex items-center gap-3 p-4 bg-stone-50 rounded-2xl border border-stone-100">
                    <input type="checkbox" id="isGroup" checked={form.isGroup} onChange={e => setForm({...form, isGroup: e.target.checked})} className="w-5 h-5 accent-brand-orange" />
                    <label htmlFor="isGroup" className="text-sm font-black text-stone-700 cursor-pointer">設定為「團體治療」</label>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1.5 ml-2">負責人員</label>
                      <select 
                        className="w-full h-12 px-4 rounded-2xl border-2 border-stone-50 bg-stone-50 font-bold outline-none" 
                        value={form.therapistId} 
                        onChange={e => setForm({...form, therapistId: e.target.value})} 
                        required
                        disabled={user?.role === 'therapist'}
                      >
                        <option value="">選擇人員</option>
                        {therapists.filter(t => t.category === form.category).map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1.5 ml-2">治療項目</label>
                      <select className="w-full h-12 px-4 rounded-2xl border-2 border-stone-50 bg-stone-50 font-bold outline-none" value={form.treatmentId} onChange={e => setForm({...form, treatmentId: e.target.value})} required disabled={!form.therapistId}>
                        <option value="">選擇項目</option>
                        {treatments.filter(tr => tr.category === form.category).map(tr => <option key={tr.id} value={tr.id}>{tr.name} (${tr.patientPrice})</option>)}
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1.5 ml-2">預約備註</label>
                    <textarea className="w-full h-24 px-5 py-3 rounded-2xl border-2 border-stone-50 bg-stone-50 font-bold outline-none focus:border-brand-orange transition-all resize-none text-sm shadow-inner" value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} placeholder="請輸入備註..." />
                  </div>
                  <Button type="submit" size="lg" className="w-full mt-4 h-14">完成送出</Button>
               </form>
            </Modal>
          </div>
        );
      };

      const SettingsView = ({ therapists, treatments, appointments, logs, accounts, onUpdateT, onUpdateTr, onUpdateA, onImportData }) => {
        const [tab, setTab] = useState('accounts');
        const [isTrModalOpen, setIsTrModalOpen] = useState(false);
        const [isTModalOpen, setIsTModalOpen] = useState(false);
        const [isAModalOpen, setIsAModalOpen] = useState(false);
        const [editingTr, setEditingTr] = useState(null);
        const [editingT, setEditingT] = useState(null);
        const [editingA, setEditingA] = useState(null);
        const [trForm, setTrForm] = useState({ name: '', category: '心理', price: '', fee: '', isGroup: false });
        const [tForm, setTForm] = useState({ name: '', category: '心理', username: '', password: '' });
        const [aForm, setAForm] = useState({ name: '', username: '', password: '', role: 'frontdesk' });

        const themes = { '心理': 'bg-purple-50 text-purple-600 border-purple-100', '職能': 'bg-blue-50 text-blue-600 border-blue-100', 'rTMS': 'bg-emerald-50 text-emerald-600 border-emerald-100' };

        const handleAddNew = (cat) => {
          if (tab === 'therapists') {
             setEditingT(null);
             setTForm({ name: '', category: cat, username: '', password: '' });
             setIsTModalOpen(true);
          } else {
             setEditingTr(null);
             setTrForm({ name: '', category: cat, price: '1600', fee: '800', isGroup: false });
             setIsTrModalOpen(true);
          }
        };

        const handleAddNewA = () => {
           setEditingA(null);
           setAForm({ name: '', username: '', password: '', role: 'frontdesk' });
           setIsAModalOpen(true);
        };

        const handleEditTr = (tr) => {
          setEditingTr(tr);
          setTrForm({ 
            name: tr.name, 
            category: tr.category, 
            price: tr.patientPrice.toString(), 
            fee: tr.therapistFee.toString(), 
            isGroup: !!tr.isGroupTherapy 
          });
          setIsTrModalOpen(true);
        };

        const handleEditT = (t) => {
          setEditingT(t);
          setTForm({ name: t.name, category: t.category, username: t.username || '', password: t.password || '' });
          setIsTModalOpen(true);
        };

        const handleEditA = (a) => {
          setEditingA(a);
          setAForm({ name: a.name, username: a.username, password: a.password, role: a.role });
          setIsAModalOpen(true);
        };

        const handleTrSubmit = (e) => {
          e.preventDefault();
          if (editingTr) {
            onUpdateTr(treatments.map(x => x.id === editingTr.id ? { 
              ...x, 
              name: trForm.name.trim(), 
              patientPrice: parseInt(trForm.price) || 0, 
              therapistFee: parseInt(trForm.fee) || 0,
              isGroupTherapy: trForm.isGroup
            } : x));
          } else {
            onUpdateTr([...treatments, { 
              id: `tr_${Date.now()}_${Math.random()}`, 
              name: trForm.name.trim(), 
              category: trForm.category, 
              patientPrice: parseInt(trForm.price) || 0, 
              therapistFee: parseInt(trForm.fee) || 0,
              isGroupTherapy: trForm.isGroup
            }]);
          }
          setIsTrModalOpen(false);
        };

        const handleTSubmit = (e) => {
          e.preventDefault();
          if (editingT) {
            onUpdateT(therapists.map(x => x.id === editingT.id ? { ...x, name: tForm.name.trim(), username: tForm.username.trim(), password: tForm.password } : x));
          } else {
            onUpdateT([...therapists, { id: `t_${Date.now()}_${Math.random()}`, name: tForm.name.trim(), category: tForm.category, username: tForm.username.trim(), password: tForm.password }]);
          }
          setIsTModalOpen(false);
        };

        const handleASubmit = (e) => {
          e.preventDefault();
          if (editingA) {
            onUpdateA(accounts.map(x => x.id === editingA.id ? { ...x, ...aForm } : x));
          } else {
            onUpdateA([...accounts, { id: `acc_${Date.now()}_${Math.random()}`, ...aForm }]);
          }
          setIsAModalOpen(false);
        };

        return (
          <div className="space-y-6">
            <div className="bg-white p-2 rounded-2xl shadow-sm border border-stone-100 flex gap-2 overflow-x-auto no-scrollbar">
              <button onClick={() => setTab('accounts')} className={`flex-1 py-3 px-4 rounded-xl text-xs font-black transition-all whitespace-nowrap ${tab === 'accounts' ? 'bg-stone-900 text-white shadow-lg' : 'text-stone-400 hover:bg-stone-50'}`}>帳號管理</button>
              <button onClick={() => setTab('therapists')} className={`flex-1 py-3 px-4 rounded-xl text-xs font-black transition-all whitespace-nowrap ${tab === 'therapists' ? 'bg-stone-900 text-white shadow-lg' : 'text-stone-400 hover:bg-stone-50'}`}>治療師管理</button>
              <button onClick={() => setTab('treatments')} className={`flex-1 py-3 px-4 rounded-xl text-xs font-black transition-all whitespace-nowrap ${tab === 'treatments' ? 'bg-stone-900 text-white shadow-lg' : 'text-stone-400 hover:bg-stone-50'}`}>治療項目</button>
              <button onClick={() => setTab('logs')} className={`flex-1 py-3 px-4 rounded-xl text-xs font-black transition-all whitespace-nowrap ${tab === 'logs' ? 'bg-stone-900 text-white shadow-lg' : 'text-stone-400 hover:bg-stone-50'}`}>工作日誌</button>
              <button onClick={() => setTab('security')} className={`flex-1 py-3 px-4 rounded-xl text-xs font-black transition-all whitespace-nowrap ${tab === 'security' ? 'bg-stone-900 text-white shadow-lg' : 'text-stone-400 hover:bg-stone-50'}`}>備份與安全</button>
            </div>

            {tab === 'accounts' ? (
              <div className="bg-white rounded-[3rem] border border-stone-100 shadow-sm overflow-hidden p-8">
                <div className="flex justify-between items-center mb-8">
                  <div>
                    <h3 className="text-2xl font-black text-stone-800 flex items-center gap-2">
                      <UsersIcon size={24} className="text-brand-orange" /> 帳號管理
                    </h3>
                    <p className="text-xs text-stone-400 font-bold mt-1 uppercase tracking-widest">管理診所登入帳號與權限</p>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                  {/* Column 1: Counter Accounts */}
                  <div className="space-y-6">
                    <div className="flex justify-between items-center border-b border-stone-50 pb-4">
                      <h4 className="text-lg font-black text-stone-700 flex items-center gap-2">
                        <CircleUser size={20} className="text-blue-500" /> 櫃檯帳號
                      </h4>
                      <Button size="sm" variant="secondary" onClick={handleAddNewA} className="h-8 rounded-lg">
                        <Plus size={14} className="mr-1" /> 新增櫃檯
                      </Button>
                    </div>
                    <div className="grid grid-cols-1 gap-4">
                      {accounts.filter(a => a.role === 'frontdesk').map(a => (
                        <div key={a.id} className="p-5 bg-stone-50 border border-stone-100 rounded-2xl flex flex-col gap-2 shadow-sm group hover:border-blue-200 transition-all">
                          <div className="flex justify-between items-center">
                            <p className="font-black text-stone-800">{a.name}</p>
                            <span className="text-[9px] font-black px-2 py-0.5 rounded-full uppercase bg-blue-50 text-blue-500">櫃檯</span>
                          </div>
                          <div className="flex justify-between items-center">
                            <p className="text-xs text-stone-400 font-bold">帳號: {a.username}</p>
                            <div className="flex gap-1">
                              <button onClick={() => handleEditA(a)} className="text-stone-400 hover:text-brand-orange transition-all p-2"><Edit3 size={16}/></button>
                              <button onClick={() => confirm(`確定移除 ${a.name} 的帳號？`) && onUpdateA(accounts.filter(x => x.id !== a.id))} className="text-stone-300 hover:text-red-500 transition-all p-2"><Trash2 size={16}/></button>
                            </div>
                          </div>
                        </div>
                      ))}
                      {accounts.filter(a => a.role === 'frontdesk').length === 0 && (
                        <div className="py-12 text-center text-stone-300 border-2 border-dashed border-stone-100 rounded-2xl flex flex-col items-center">
                          <CircleUser size={24} className="mb-2 opacity-30" />
                          <span className="text-[10px] font-black uppercase">尚無櫃檯帳號</span>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Column 2: Therapist Accounts */}
                  <div className="space-y-6">
                    <div className="flex justify-between items-center border-b border-stone-50 pb-4">
                      <h4 className="text-lg font-black text-stone-700 flex items-center gap-2">
                        <Users size={20} className="text-purple-500" /> 治療師帳號
                      </h4>
                      <span className="text-[10px] font-black text-stone-400 uppercase tracking-widest">連動治療師名單</span>
                    </div>
                    <div className="grid grid-cols-1 gap-4">
                      {therapists.map(t => (
                        <div key={t.id} className={`p-5 border rounded-2xl flex flex-col gap-2 shadow-sm group transition-all ${t.username ? 'bg-stone-50 border-stone-100 hover:border-purple-200' : 'bg-red-50/30 border-red-100 border-dashed'}`}>
                          <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2">
                              <p className="font-black text-stone-800">{t.name}</p>
                              <span className={`text-[9px] font-black px-2 py-0.5 rounded-full uppercase ${t.category === '心理' ? 'bg-purple-50 text-purple-500' : t.category === '職能' ? 'bg-blue-50 text-blue-500' : 'bg-emerald-50 text-emerald-500'}`}>
                                {t.category}
                              </span>
                            </div>
                            <span className={`text-[9px] font-black px-2 py-0.5 rounded-full uppercase ${t.username ? 'bg-purple-50 text-purple-500' : 'bg-red-50 text-red-500'}`}>
                              {t.username ? '已設定' : '未設定'}
                            </span>
                          </div>
                          <div className="flex justify-between items-center">
                            <p className="text-xs text-stone-400 font-bold">
                              {t.username ? `帳號: ${t.username}` : '請點擊編輯設定帳號密碼'}
                            </p>
                            <div className="flex gap-1">
                              <button onClick={() => handleEditT(t)} className="text-stone-400 hover:text-brand-orange transition-all p-2">
                                <Edit3 size={16}/>
                              </button>
                            </div>
                          </div>
                        </div>
                      ))}
                      {therapists.length === 0 && (
                        <div className="py-12 text-center text-stone-300 border-2 border-dashed border-stone-100 rounded-2xl flex flex-col items-center">
                          <Users size={24} className="mb-2 opacity-30" />
                          <span className="text-[10px] font-black uppercase">請先至治療師管理新增人員</span>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            ) : tab === 'security' ? (
              <div className="space-y-6">
                <div className="bg-white p-8 rounded-[3rem] border border-stone-100 shadow-sm space-y-6">
                  <div className="flex items-center gap-4 border-b border-stone-50 pb-6">
                    <div className="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center shadow-inner">
                      <CheckCircle size={24} />
                    </div>
                    <div>
                      <h3 className="text-xl font-black text-stone-800">雲端同步狀態</h3>
                      <p className="text-xs text-stone-400 font-bold mt-1 uppercase tracking-widest">目前資料已同步至 MongoDB Atlas 雲端資料庫</p>
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="p-6 bg-stone-50 rounded-[2rem] space-y-3">
                      <h4 className="font-black text-stone-700 flex items-center gap-2">
                        <Download size={18} className="text-brand-orange" /> 匯出完整備份
                      </h4>
                      <p className="text-xs text-stone-500 font-medium leading-relaxed">
                        將診所所有資料（包含預約、人員、項目、日誌）匯出為單一 JSON 檔案。建議定期下載並儲存在安全的離線空間。
                      </p>
                      <Button 
                        onClick={() => {
                          const data = { therapists, treatments, appointments, logs, accounts, exportDate: new Date().toISOString(), version: '1.0' };
                          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                          const url = URL.createObjectURL(blob);
                          const a = document.createElement('a');
                          a.href = url;
                          a.download = `jiale_clinic_backup_${format(new Date(), 'yyyyMMdd_HHmm')}.json`;
                          a.click();
                          URL.revokeObjectURL(url);
                        }}
                        className="w-full mt-2"
                      >
                        立即下載備份檔案
                      </Button>
                    </div>

                    <div className="p-6 bg-stone-50 rounded-[2rem] space-y-3">
                      <h4 className="font-black text-stone-700 flex items-center gap-2">
                        <Upload size={18} className="text-blue-500" /> 匯入備份資料
                      </h4>
                      <p className="text-xs text-stone-500 font-medium leading-relaxed">
                        從備份檔案恢復資料。注意：匯入將會「覆蓋」目前系統中的所有資料，請務必謹慎操作。
                      </p>
                      <div className="relative">
                        <input 
                          type="file" 
                          accept=".json"
                          onChange={(e) => {
                            const file = e.target.files[0];
                            if (!file) return;
                            if (confirm('警告：匯入備份將會覆蓋目前所有資料，確定要繼續嗎？')) {
                              const reader = new FileReader();
                              reader.onload = (event) => {
                                try {
                                  const data = JSON.parse(event.target.result);
                                  if (data.therapists && data.treatments && data.appointments) {
                            onImportData(data);
                            alert('資料匯入成功！系統將自動同步至雲端。');
                          } else {
                                    alert('無效的備份檔案格式。');
                                  }
                                } catch (err) {
                                  alert('讀取檔案失敗。');
                                }
                              };

                      <li>建議每月至少進行一次手動備份下載，並將檔案存放在加密的隨身碟或受保護的雲端硬碟中。</li>

            ) : tab === 'logs' ? (

                <div className="p-8 border-b border-stone-100 flex items-center justify-between bg-stone-50/30">
                  <div>

                    <p className="text-xs text-stone-400 font-bold mt-1 uppercase tracking-widest">記錄所有系統變更細節</p>

                  <div className="text-right">

                      </tr>
                    </thead>
                    <tbody className="text-xs font-bold text-stone-600">
                      {logs.map((log, i) => (
                        <tr key={log.id} className={`border-t border-stone-50 hover:bg-stone-50/50 transition-colors ${i % 2 === 0 ? 'bg-white' : 'bg-stone-50/20'}`}>

                            </div>

                      ) : (

                            <div className="flex justify-between items-start">

                                <button onClick={() => handleEditTr(tr)} className="text-stone-400 hover:text-brand-orange transition-all p-2"><Edit3 size={16}/></button>
                                <button onClick={() => confirm(`確定移除 ${tr.name}？`) && onUpdateTr(treatments.filter(x => x.id !== tr.id))} className="text-stone-300 hover:text-red-500 transition-all p-2"><Trash2 size={16}/></button>

                            <div className="flex gap-2 text-[10px] font-bold">
                              <span className="bg-stone-50 text-stone-400 px-2 py-0.5 rounded">收 ${tr.patientPrice}</span>
                              <span className="bg-amber-50 text-brand-orange px-2 py-0.5 rounded">薪 ${tr.therapistFee}</span>
                            </div>
                          </div>
                        ))
                      )}
                      {(tab === 'therapists' ? therapists : treatments).filter(x => x.category === cat).length === 0 && (
                        <div className="py-12 text-center text-stone-200 border-2 border-dashed border-stone-50 rounded-2xl flex flex-col items-center">
                          <UsersIcon size={24} className="mb-2 opacity-30" />
                          <span className="text-[10px] font-black uppercase">尚無資料</span>
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}

            <Modal isOpen={isTrModalOpen} onClose={() => setIsTrModalOpen(false)} title={editingTr ? "編輯治療項目" : "新增治療項目"}>

                  <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 ml-2">項目名稱</label>
                  <input required className="w-full h-12 px-5 rounded-xl bg-stone-50 border-none font-black shadow-inner" placeholder="例如：個別心理治療" value={trForm.name} onChange={e => setTrForm({...trForm, name: e.target.value})} autoFocus />
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 ml-2">收費金額</label>
                    <input type="number" required className="w-full h-12 px-5 rounded-xl bg-stone-50 border-none font-black shadow-inner" value={trForm.price} onChange={e => setTrForm({...trForm, price: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 ml-2">人員薪資</label>
                    <input type="number" required className="w-full h-12 px-5 rounded-xl bg-stone-50 border-none font-black shadow-inner" value={trForm.fee} onChange={e => setTrForm({...trForm, fee: e.target.value})} />
                  </div>
                </div>
                <div className="flex items-center gap-3 p-4 bg-stone-50 rounded-xl cursor-pointer" onClick={() => setTrForm({...trForm, isGroup: !trForm.isGroup})}>
                  <input type="checkbox" checked={trForm.isGroup} onChange={e => setTrForm({...trForm, isGroup: e.target.checked})} onClick={e => e.stopPropagation()} className="w-5 h-5 accent-brand-orange" />
                  <span className="font-black text-stone-700 text-sm">設定為「團體治療」項目</span>
                </div>
                <Button type="submit" className="w-full h-14 shadow-lg">{editingTr ? "儲存修改" : "確認新增"}</Button>
              </form>
            </Modal>

            <Modal isOpen={isTModalOpen} onClose={() => setIsTModalOpen(false)} title={editingT ? "編輯治療師" : "新增治療師"}>
              <form onSubmit={handleTSubmit} className="space-y-5">
                <div>
                  <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 ml-2">治療師姓名</label>
                  <input required className="w-full h-12 px-5 rounded-xl bg-stone-50 border-none font-black shadow-inner" placeholder="請輸入姓名" value={tForm.name} onChange={e => setTForm({...tForm, name: e.target.value})} autoFocus />
                </div>
                <div>
                  <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 ml-2">登入帳號</label>
                  <input required className="w-full h-12 px-5 rounded-xl bg-stone-50 border-none font-black shadow-inner" placeholder="請輸入帳號" value={tForm.username} onChange={e => setTForm({...tForm, username: e.target.value})} />
                </div>
                <div>
                  <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 ml-2">登入密碼</label>
                  <input required type="password" className="w-full h-12 px-5 rounded-xl bg-stone-50 border-none font-black shadow-inner" placeholder="請輸入密碼" value={tForm.password} onChange={e => setTForm({...tForm, password: e.target.value})} />
                </div>
                <Button type="submit" className="w-full h-14 shadow-lg">{editingT ? "儲存修改" : "確認新增"}</Button>
              </form>

            <Modal isOpen={isAModalOpen} onClose={() => setIsAModalOpen(false)} title={editingA ? "編輯帳號" : "新增帳號"}>
              <form onSubmit={handleASubmit} className="space-y-5">
                <div>
                  <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 ml-2">顯示名稱</label>
                  <input required className="w-full h-12 px-5 rounded-xl bg-stone-50 border-none font-black shadow-inner" placeholder="例如：王小明" value={aForm.name} onChange={e => setAForm({...aForm, name: e.target.value})} autoFocus />

                  <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 ml-2">登入帳號</label>
                  <input required className="w-full h-12 px-5 rounded-xl bg-stone-50 border-none font-black shadow-inner" placeholder="請輸入帳號" value={aForm.username} onChange={e => setAForm({...aForm, username: e.target.value})} />

                  <label className="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 ml-2">登入密碼</label>
                  <input required type="password" className="w-full h-12 px-5 rounded-xl bg-stone-50 border-none font-black shadow-inner" placeholder="請輸入密碼" value={aForm.password} onChange={e => setAForm({...aForm, password: e.target.value})} />
