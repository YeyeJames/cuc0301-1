                <Button type="submit" className="w-full h-14 shadow-lg">{editingA ? "儲存修改" : "確認新增"}</Button>
              </form>
            </Modal>
          </div>
        );
      };

      // --- Reports View ---
      const ReportsView = ({ appointments, therapists, treatments }) => {
        const [selectedMonth, setSelectedMonth] = useState(format(new Date(), 'yyyy-MM'));

        const filteredApts = useMemo(() => {
          return appointments.filter(a => a.status === 'completed' && a.date && a.date.startsWith(selectedMonth));
        }, [appointments, selectedMonth]);

        const stats = useMemo(() => {
          const therapistStats = {};
          const treatmentStats = {};
          let totalRevenue = 0;
          let totalExpense = 0;

          filteredApts.forEach(apt => {
            const treatment = treatments.find(t => t.id === apt.treatmentId);
            const therapist = therapists.find(t => t.id === apt.therapistId);
            if (!treatment || !therapist) return;

            const fee = treatment.therapistFee || 0;
            const price = apt.patientPrice || treatment.patientPrice || 0;

            totalRevenue += price;
            totalExpense += fee;

            // Therapist Stats
            if (!therapistStats[therapist.id]) {
              therapistStats[therapist.id] = { 
                id: therapist.id, 
                name: therapist.name, 
                salary: 0, 
                count: 0,
                details: [] 
              };
            }
            therapistStats[therapist.id].salary += fee;
            therapistStats[therapist.id].count += 1;
            therapistStats[therapist.id].details.push({
              date: apt.date,
              patient: apt.patientName,
              treatment: treatment.name,
              fee: fee,
              price: price
            });

            // Treatment Stats
            if (!treatmentStats[treatment.id]) {
              treatmentStats[treatment.id] = { name: treatment.name, count: 0, revenue: 0 };
            }
            treatmentStats[treatment.id].count += 1;
            treatmentStats[treatment.id].revenue += price;
          });

          return {
            therapists: Object.values(therapistStats).sort((a, b) => b.salary - a.salary),
            treatments: Object.values(treatmentStats).sort((a, b) => b.count - a.count),
            totalRevenue,
            totalExpense,
            netProfit: totalRevenue - totalExpense
          };
        }, [filteredApts, therapists, treatments]);

        const COLORS = ['#ffb85f', '#f9e076', '#d4ca91', '#44403c', '#8884d8', '#82ca9d'];

        return (
          <div className="space-y-8 pb-20">
            {/* Header & Month Picker */}
            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div>
                <h2 className="text-3xl font-black text-stone-800 tracking-tight">數據報表分析</h2>
                <p className="text-stone-400 font-bold mt-1">診所營運數據與薪資統計</p>
              </div>
              <div className="flex items-center gap-3">
                <Button 
                  variant="secondary" 
                  icon={<Download size={16} />} 
                  onClick={() => {
                    let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                    csvContent += "治療師,日期,個案姓名,治療項目,實收金額,治療師抽成\n";
                    
                    stats.therapists.forEach(t => {
                      t.details.forEach(d => {
                        csvContent += `${t.name},${d.date},${d.patient},${d.treatment},${d.price || 0},${d.fee}\n`;
                      });
                    });
                    
                    csvContent += `\n總計,,,${stats.totalRevenue},${stats.totalExpense}\n`;
                    
                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", `jiale_report_${selectedMonth}.csv`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                  }}
                  className="bg-white border-stone-100 shadow-sm text-stone-600 hover:bg-stone-50"
                >
                  匯出 CSV
                </Button>
                <div className="flex items-center gap-3 bg-white p-2 rounded-2xl shadow-sm border border-stone-100">
                  <Calendar size={18} className="text-brand-orange ml-2" />
                  <input 
                    type="month" 
                    value={selectedMonth} 
                    onChange={e => setSelectedMonth(e.target.value)}
                    className="bg-transparent border-none font-black text-stone-700 outline-none pr-4"
                  />
                </div>
              </div>
            </div>

            {/* Summary Cards */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <div className="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm">
                <p className="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">總營業額</p>
                <p className="text-2xl font-black text-stone-800">${stats.totalRevenue.toLocaleString()}</p>
                <div className="mt-2 flex items-center gap-1 text-[10px] font-bold text-emerald-500 bg-emerald-50 w-fit px-2 py-0.5 rounded-full">
                  <Banknote size={10} /> 實收金額
                </div>
              </div>
              <div className="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm">
                <p className="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">總薪資支出</p>
                <p className="text-2xl font-black text-stone-800">${stats.totalExpense.toLocaleString()}</p>
                <div className="mt-2 flex items-center gap-1 text-[10px] font-bold text-brand-orange bg-brand-orange/5 w-fit px-2 py-0.5 rounded-full">
                  <UsersIcon size={10} /> 人事成本
                </div>
              </div>
              <div className="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm">
                <p className="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">診所淨利</p>
                <p className="text-2xl font-black text-emerald-600">${stats.netProfit.toLocaleString()}</p>
                <div className="mt-2 flex items-center gap-1 text-[10px] font-bold text-stone-400 bg-stone-50 w-fit px-2 py-0.5 rounded-full">
                  <ChartColumn size={10} /> 營運績效
                </div>
              </div>
              <div className="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm">
                <p className="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">總服務人次</p>
                <p className="text-2xl font-black text-stone-800">{filteredApts.length} <span className="text-sm font-bold text-stone-400">次</span></p>
                <div className="mt-2 flex items-center gap-1 text-[10px] font-bold text-stone-400 bg-stone-50 w-fit px-2 py-0.5 rounded-full">
                  <CheckCircle size={10} /> 已完成
                </div>
              </div>
            </div>

            {/* Charts Section */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white p-8 rounded-[3rem] border border-stone-100 shadow-sm">
                <h3 className="font-black text-stone-800 mb-6 flex items-center gap-2">
                  <ChartColumn size={18} className="text-brand-orange" /> 治療師薪資分佈
                </h3>
                <div className="h-64 w-full">
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={stats.therapists}>
                      <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f5f5f5" />
                      <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 12, fontWeight: 700, fill: '#a8a29e'}} />
                      <YAxis axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 700, fill: '#a8a29e'}} />
                      <Tooltip 
                        contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)', fontWeight: 900 }}
                        cursor={{fill: '#fffbeb'}}
                      />
                      <Bar dataKey="salary" fill="#ffb85f" radius={[8, 8, 0, 0]} barSize={40} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>

              <div className="bg-white p-8 rounded-[3rem] border border-stone-100 shadow-sm">
                <h3 className="font-black text-stone-800 mb-6 flex items-center gap-2">
                  <Zap size={18} className="text-brand-orange" /> 治療項目佔比
                </h3>
                <div className="h-64 w-full">
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie
                        data={stats.treatments}
                        cx="50%"
                        cy="50%"
                        innerRadius={60}
                        outerRadius={80}
                        paddingAngle={5}
                        dataKey="count"
                      >
                        {stats.treatments.map((entry, index) => (
                          <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                        ))}
                      </Pie>
                      <Tooltip />
                      <Legend verticalAlign="bottom" height={36} iconType="circle" wrapperStyle={{fontSize: '12px', fontWeight: 700}} />
                    </PieChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>

            {/* Salary Slips */}
            <div className="space-y-6">
              <div className="flex items-center justify-between">
                <h3 className="text-xl font-black text-stone-800 flex items-center gap-2">
                  <FileText size={20} className="text-brand-orange" /> 治療師薪資明細 (薪資條)
                </h3>
                <button className="flex items-center gap-2 px-4 py-2 bg-stone-900 text-white rounded-xl text-xs font-black hover:bg-stone-800 transition-all shadow-lg">
                  <Download size={14} /> 匯出報表
                </button>
              </div>

              <div className="space-y-4">
                {stats.therapists.map(t => (
                  <div key={t.id} className="bg-white rounded-[2.5rem] border border-stone-100 shadow-sm overflow-hidden">
                    <div className="p-6 bg-stone-50/50 flex items-center justify-between border-b border-stone-100">
                      <div className="flex items-center gap-4">
                        <div className="w-12 h-12 rounded-2xl bg-brand-orange text-white flex items-center justify-center font-black text-lg shadow-lg shadow-brand-orange/20">
                          {t.name.charAt(0)}
                        </div>
                        <div>
                          <p className="font-black text-stone-800 text-lg">{t.name}</p>
                          <p className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">{selectedMonth} 薪資結算</p>
                        </div>
                      </div>
                      <div className="text-right">
                        <p className="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">本月總薪資</p>
                        <p className="text-2xl font-black text-brand-orange">${t.salary.toLocaleString()}</p>
                      </div>
                    </div>
                    <div className="p-6 overflow-x-auto">
                      <table className="w-full text-left">
                        <thead>
                          <tr className="text-[10px] font-black text-stone-400 uppercase tracking-widest">
                            <th className="pb-4 pl-2">日期</th>
                            <th className="pb-4">個案姓名</th>
                            <th className="pb-4">治療項目</th>
                            <th className="pb-4 text-right pr-2">薪資額</th>
                          </tr>
                        </thead>
                        <tbody className="text-sm font-bold text-stone-600">
                          {t.details.map((d, i) => (
                            <tr key={i} className="border-t border-stone-50">
                              <td className="py-4 pl-2 text-stone-400">{d.date}</td>
                              <td className="py-4 font-black text-stone-800">{d.patient}</td>
                              <td className="py-4">{d.treatment}</td>
                              <td className="py-4 text-right pr-2 text-brand-orange font-black">${d.fee.toLocaleString()}</td>
                            </tr>
                          ))}
                        </tbody>
                        <tfoot>
                          <tr className="border-t-2 border-stone-100">
                            <td colSpan="3" className="py-6 pl-2 font-black text-stone-800">合計服務人次：{t.count} 次</td>
                            <td className="py-6 text-right pr-2 font-black text-xl text-stone-900">${t.salary.toLocaleString()}</td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  </div>
                ))}
                {stats.therapists.length === 0 && (
                  <div className="py-20 text-center bg-white rounded-[3rem] border border-stone-100">
                    <Coffee size={40} className="mx-auto text-stone-100 mb-4" />
                    <p className="text-stone-400 font-bold">本月尚無結算數據</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      const LoginView = ({ onLogin, accounts, therapists }) => {
        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');

        const handleSubmit = (e) => {
          e.preventDefault();
          
          // Super Admin check
          if (username === 'chin' && password === '520') {
            onLogin({ name: '系統管理員', role: 'admin', username: 'chin' });
            return;
          }

          // Therapist check (Linked)
          const therapist = therapists.find(t => t.username === username && t.password === password);
          if (therapist) {
            onLogin({
              name: therapist.name,
              role: 'therapist',
              username: therapist.username,
              therapistId: therapist.id
            });
            return;
          }

          // Dynamic Accounts check (Front Desk)
          const account = accounts.find(a => a.username === username && a.password === password);
          if (account) {
            onLogin({ 
              name: account.name, 
              role: account.role, 
              username: account.username,
              therapistId: null 
            });
          } else {
            alert('帳號或密碼錯誤');
          }
        };

        return (
          <div className="h-screen bg-[#fffef5] flex items-center justify-center p-4">
            <div className="bg-white rounded-[3rem] shadow-2xl p-10 max-w-md w-full border border-stone-100 text-center">
              <JialeLogo className="w-16 h-16 mx-auto mb-6" />
              <h1 className="text-3xl font-black text-stone-800 mb-8 tracking-tight">佳樂身心診所</h1>
              
              <form onSubmit={handleSubmit} className="space-y-4">
                <input 
                  type="text" 
                  placeholder="請輸入帳號" 
                  className="w-full h-14 px-6 rounded-2xl border-2 border-stone-100 bg-stone-50 font-bold text-center outline-none focus:border-brand-orange transition-all shadow-inner" 
                  value={username}
                  onChange={e => setUsername(e.target.value)}
                  required 
                />
                <input 
                  type="password" 
                  placeholder="請輸入密碼" 
                  className="w-full h-14 px-6 rounded-2xl border-2 border-stone-100 bg-stone-50 font-bold text-center outline-none focus:border-brand-orange transition-all shadow-inner" 
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  required 
                />
                <Button type="submit" size="lg" className="w-full h-14 text-lg mt-4 shadow-lg shadow-brand-orange/20">進入系統</Button>
              </form>
            </div>
          </div>
        );
      };

      const App = () => {
        const [user, setUser] = useState(DataService.get(KEYS.SESSION, null));
        const [view, setView] = useState('schedule');
        const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
        const [syncStatus, setSyncStatus] = useState('connecting'); // connecting, synced, error
        
        const [accounts, setAccounts] = useState(DataService.get(KEYS.ACCOUNTS, []));
        const [therapists, setTherapists] = useState(DataService.get(KEYS.THERAPISTS, []));
        const [treatments, setTreatments] = useState(DataService.get(KEYS.TREATMENTS, []));
        const [appointments, setAppointments] = useState(DataService.get(KEYS.APPOINTMENTS, []));
        const [logs, setLogs] = useState(DataService.get('jiale_logs', []));

        const socketRef = useRef(null);
        const isRemoteUpdate = useRef(false);

        // Helper to add logs
        const addLog = useCallback((action, detail) => {
          const newLog = {
            id: `log_${Date.now()}_${Math.random()}`,
            timestamp: format(new Date(), 'yyyy-MM-dd HH:mm:ss'),
            user: user?.name || '系統',
            action,
            detail
          };
          setLogs(prev => [newLog, ...prev].slice(0, 500)); // Keep last 500 logs
        }, [user]);

        // Background Sync Logic
        useEffect(() => {
          let reconnectTimeout;
          const connect = () => {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const socket = new WebSocket(`${protocol}//${window.location.host}`);
            socketRef.current = socket;
            setSyncStatus('connecting');

            socket.onopen = () => {
              console.log('Sync connected');
              setSyncStatus('synced');
            };

            socket.onmessage = (event) => {
              try {
                const payload = JSON.parse(event.data);
                if (payload.type === 'INIT' || payload.type === 'SYNC') {
                  const { appointments: remoteApts, therapists: remoteTherapists, treatments: remoteTreatments, logs: remoteLogs, accounts: remoteAccounts } = payload.data;
                  
                  // Mark as remote update to prevent loop
                  isRemoteUpdate.current = true;
                  
                  if (remoteApts) setAppointments(remoteApts);
                  if (remoteTherapists) setTherapists(remoteTherapists);
                  if (remoteTreatments) setTreatments(remoteTreatments);
                  if (remoteLogs) setLogs(remoteLogs);
                  if (remoteAccounts) setAccounts(remoteAccounts);
                  
                  setSyncStatus('synced');
                  
                  // Reset flag after state updates are processed
                  setTimeout(() => { isRemoteUpdate.current = false; }, 100);
                }
              } catch (e) {
                console.error('Sync error:', e);
              }
            };

            socket.onclose = () => {
              console.log('Sync disconnected, retrying in 3s...');
              setSyncStatus('error');
              reconnectTimeout = setTimeout(connect, 3000);
            };

            socket.onerror = (err) => {
              console.error('WebSocket error:', err);
              setSyncStatus('error');
            };
          };

          connect();
          return () => {
            if (socketRef.current) socketRef.current.close();
            clearTimeout(reconnectTimeout);
          };
        }, []);

        // Push updates to cloud (Debounced)
        const pushToCloud = useCallback((data) => {
          if (socketRef.current && socketRef.current.readyState === WebSocket.OPEN) {
            socketRef.current.send(JSON.stringify({ type: 'UPDATE', data }));
            setSyncStatus('synced');
          }
        }, []);

        // Sync local storage and push to cloud when state changes
        useEffect(() => {
          const data = { appointments, therapists, treatments, logs, accounts };
          DataService.save(KEYS.APPOINTMENTS, appointments);
          DataService.save(KEYS.THERAPISTS, therapists);
          DataService.save(KEYS.TREATMENTS, treatments);
          DataService.save(KEYS.ACCOUNTS, accounts);
          DataService.save('jiale_logs', logs);
          
          // Only push if we have a connection AND it's a local change
          if (!isRemoteUpdate.current) {
            const timeout = setTimeout(() => pushToCloud(data), 500);
            return () => clearTimeout(timeout);
          }
        }, [appointments, therapists, treatments, logs, accounts, pushToCloud]);

        useEffect(() => { document.getElementById('loading').style.display = 'none'; }, []);

        const handleUpdateAccounts = useCallback((data) => setAccounts(data), []);
        const handleUpdateTherapists = useCallback((data) => setTherapists(data), []);
        const handleUpdateTreatments = useCallback((data) => setTreatments(data), []);

        if (!user) return <LoginView onLogin={u => { setUser(u); DataService.save(KEYS.SESSION, u); }} accounts={accounts} therapists={therapists} />;

        return (
          <div className="min-h-screen bg-[#fffef5] flex flex-col lg:flex-row">
            {/* Mobile Header */}
            <div className="lg:hidden bg-stone-900 text-white p-4 flex items-center justify-between sticky top-0 z-40 shadow-md">
              <div className="flex items-center gap-3">
                <div className="bg-white p-1.5 rounded-xl"><JialeLogo className="w-6 h-6" /></div>
                <h1 className="font-black text-lg">佳樂身心</h1>
              </div>
              <button onClick={() => setIsMobileMenuOpen(true)} className="p-2 bg-stone-800 rounded-xl hover:bg-stone-700 transition-colors">
                <Menu size={24} />
              </button>
            </div>

            {/* Mobile Overlay */}
            {isMobileMenuOpen && (
              <div 
                className="fixed inset-0 bg-black/50 z-40 lg:hidden backdrop-blur-sm"
                onClick={() => setIsMobileMenuOpen(false)}
              />
            )}

            <aside className={`fixed lg:sticky top-0 inset-y-0 left-0 w-72 bg-stone-900 text-white flex flex-col z-50 shadow-2xl transition-transform duration-300 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
              <div className="p-10 border-b border-stone-800 flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="bg-white p-2.5 rounded-2xl shadow-lg"><JialeLogo /></div>
                  <div>
                    <h1 className="font-black text-xl leading-none">佳樂身心</h1>
                    <div className="flex items-center gap-2 mt-1.5">
                      <div className={`w-1.5 h-1.5 rounded-full ${syncStatus === 'synced' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]' : syncStatus === 'connecting' ? 'bg-amber-500 animate-pulse' : 'bg-red-500'}`}></div>
                      <span className="text-[9px] text-stone-500 font-black tracking-widest uppercase">
                        {syncStatus === 'synced' ? 'Cloud Synced' : syncStatus === 'connecting' ? 'Connecting...' : 'Offline'}
                      </span>
                    </div>
                  </div>
                </div>
                <button onClick={() => setIsMobileMenuOpen(false)} className="lg:hidden p-2 bg-stone-800 rounded-xl hover:bg-stone-700 transition-colors">
                  <X size={20} />
                </button>
              </div>
              <nav className="p-6 space-y-2 flex-1">
                <button onClick={() => { setView('schedule'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-4 px-6 py-4 rounded-3xl text-sm font-black transition-all ${view === 'schedule' ? 'bg-brand-orange text-white shadow-lg' : 'text-stone-500 hover:text-brand-yellow'}`}><Calendar size={20}/> 預約排程</button>
                {user.role === 'admin' && (
                  <>
                    <button onClick={() => { setView('reports'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-4 px-6 py-4 rounded-3xl text-sm font-black transition-all ${view === 'reports' ? 'bg-brand-orange text-white shadow-lg' : 'text-stone-500 hover:text-brand-yellow'}`}><ChartColumn size={20}/> 數據報表</button>
                    <button onClick={() => { setView('settings'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-4 px-6 py-4 rounded-3xl text-sm font-black transition-all ${view === 'settings' ? 'bg-brand-orange text-white shadow-lg' : 'text-stone-500 hover:text-brand-yellow'}`}><Settings size={20}/> 系統管理</button>
                  </>
                )}
              </nav>
              <div className="p-8 border-t border-stone-800">
                <div className="mb-4 text-center">
                  <div className="text-xs text-stone-500 font-bold mb-1">目前登入</div>
                  <div className="text-sm text-white font-black">{user.name}</div>
                </div>
                <button onClick={() => { setUser(null); DataService.clear(KEYS.SESSION); }} className="w-full h-12 flex items-center justify-center gap-3 rounded-2xl bg-stone-800/50 text-stone-500 text-xs font-bold hover:bg-red-500/10 hover:text-red-400 transition-all"><LogOut size={16}/> 登出系統</button>
              </div>
            </aside>
            <main className="flex-1 p-4 lg:p-8 min-h-screen max-w-7xl mx-auto overflow-x-hidden w-full">
              {view === 'schedule' && (
                <ScheduleView 
                  user={user}
                  appointments={appointments} 
                  therapists={therapists} 
                  treatments={treatments} 
                  onAdd={x => { setAppointments([...appointments, x]); addLog('新增預約', `個案: ${x.patientName}, 日期: ${x.date}`); }} 
                  onUpdate={(id, u) => { 
                    const old = appointments.find(a => a.id === id);
                    setAppointments(appointments.map(a => a.id === id ? { ...a, ...u } : a)); 
                    addLog('更新預約', `個案: ${old?.patientName}, 變更: ${JSON.stringify(u)}`);
                  }} 
                  onDelete={id => { 
                    const old = appointments.find(a => a.id === id);
                    setAppointments(appointments.filter(a => a.id !== id)); 
                    addLog('刪除預約', `個案: ${old?.patientName}, 日期: ${old?.date}`);
                  }} 
                />
              )}
              {view === 'settings' && (
                <SettingsView 
                  therapists={therapists} 
                  treatments={treatments} 
                  appointments={appointments}
                  logs={logs} 
                  accounts={accounts}
                  onUpdateT={data => { 
                    setTherapists(data); 
                    addLog('更新治療師名單', `總人數: ${data.length}`);
                  }} 
                  onUpdateTr={data => { 
                    setTreatments(data); 
                    addLog('更新治療項目', `總項目數: ${data.length}`);
                  }} 
                  onUpdateA={data => {
                    setAccounts(data);
                    addLog('更新帳號名單', `總人數: ${data.length}`);
                  }}
                  onImportData={(data) => {
                    if (data.therapists) setTherapists(data.therapists);
                    if (data.treatments) setTreatments(data.treatments);
                    if (data.appointments) setAppointments(data.appointments);
                    if (data.logs) setLogs(data.logs);
                    if (data.accounts) setAccounts(data.accounts);
                    addLog('系統恢復', '從備份檔案匯入資料');
                  }}
                />
              )}
              {view === 'reports' && <ReportsView appointments={appointments} therapists={therapists} treatments={treatments} />}
            </main>
          </div>
        );
      };

      createRoot(document.getElementById('root')).render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
